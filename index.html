ely a grand illusion. Chada enlightens us on how ancient spiritual and religious traditions in India learned to see through this illusion to the underlying processes at the centre of reality and ourselves.\"Rich and rewarding.\" — Jay Garfield", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/selfhood-is-a-grand-illusion-41195", "thumbnail_url": "./HTLGI_files/197-personhood-is-a-grand-illusion.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41195", "item_id": "197", "offset": "191", "position": "61", "event_number": "Event [197]", "start_dt": "2026-05-24 18:00:00", "end_dt": "2026-05-24 19:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "6:30pm", "venue": "Children's Tent", "session_type": "Children's Programme", "session_type_class": "chd_color", "title": "What Does It Mean To Be Free?", "speakers": "Jo Haire", "description": "An innocent man has been kidnapped in his sleep and locked up in prison. But when he wakes up, he realises this prison is the perfect place to be, with unlimited sweets and video games and beautiful birds that fly around the hallways. He doesn’t want to leave this prison at all. But if he did want to leave and tried to go, he would have no chance. Is the man free? Join philosopher Jo Haire to discuss the true meaning of freedom.", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41200", "item_id": "202", "offset": "196", "position": "66", "event_number": "Event [202]", "start_dt": "2026-05-24 18:30:00", "end_dt": "2026-05-24 19:30:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "6:30pm", "venue": "Hat", "session_type": "Music", "session_type_class": "ls_color", "title": "EDDY", "speakers": "", "description": "EDDY is a UK-based indie-pop artist and songwriter whose music blends shimmering folk-pop with intimate, ave a couple of kids.” Should we see this shift as a conservative traditionalism that threatens to undermine decades of feminist progress? Or is it, as some claim, a radical response to the relentless capitalist machine, prioritising a slower life and less focus on economic growth? More fundamentally, does marriage inherently undermine women, or can traditional roles be endorsed alongside financial and political equality?Feminist campaigner Julie Bindel, OnlyFans model and writer Farha Khalidi, and columnist and broadcaster Mary Killen debate whether marriage emancipates or entraps.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/trad-wives-and-new-feminists-41201", "thumbnail_url": "./HTLGI_files/203-trad-wives-and-new-feminists.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41201", "item_id": "203", "offset": "197", "position": "67", "event_number": "Event [203]", "start_dt": "2026-05-24 18:45:00", "end_dt": "2026-05-24 19:45:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "7:00pm", "venue": "Blue Moon Tent", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Billy Magerison", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41203", "item_id": "205", "offset": "199", "position": "69", "event_number": "Event [205]", "start_dt": "2026-05-24 19:00:00", "end_dt": "2026-05-24 20:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "7:00pm", "venue": "Ring", "session_type": "Talks", "session_type_class": "tlk_color", "title": "The Hallucination We Call Reality", "speakers": "Karl Friston, Hilary Lawson", "description": "Most of us assume the world we perceive is simply out there. But neuroscientists increasingly argue the reality we see is a \"controlled hallucination\"; a user-in en transition, geopolitical instability, and rapid tech changes are reshaping the workplace in a time of overlapping crises. Global experts share actionable insights to help workers succeed and future-proof their careers amid uncertainty.", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41222", "item_id": "224", "offset": "218", "position": "88", "event_number": "Event [224]", "start_dt": "2026-05-24 22:00:00", "end_dt": "2026-05-24 23:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "10:00pm", "venue": "Stage", "session_type": "Comedy", "session_type_class": "LNS_color", "title": "Andrew White", "speakers": "", "description": "Opening for the likes of Jason Manford, and with writing for broadcast shows such as Mock the Week and It’s… Wagatha Christie, Andrew White is an only child with two siblings. Andrew enjoyed a precocious childhood, befriending retirees and penning self-indulgent poetry, until a literal circus clown warned him of imminent death on his 18th birthday. All the Jester foretold came to pass, and now Andrew must reflect on life without three close loved ones and do his best to honour their memories. “A plethora of memorable gags.” ★★★★★ — Chortle", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41221", "item_id": "223", "offset": "217", "position": "87", "event_number": "Event [223]", "start_dt": "2026-05-24 22:00:00", "end_dt": "2026-05-24 23:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "10:30pm", "venue": "Disco", "session_type": "Riverside Disco", "session_type_class": "dis_color", "title": "Max Galactic, DJ Emma, DJ Georgie & Maddie Sax", "speakers": "", "description": "Make your festival an epic experience, with Max Galactic & DJ Emma on the decks playing the biggest disco and club classics of all time. They will be joined by the incredible Maddie on sax, alongside new kid on the block DJ Georgie — this is one not to be missed!", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41225", "item_id": "227", "offset": "221", "position": "91", "event_number": "Event [227]", "start_dt": "2026-05-24 22:30:00", "end_dt": "2026-05-24 23:30:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "10:30pm", "venue": "Ring", "session_type": "Comedy", "session_type_class": "LNS_color", "title": "Krystal Evans", "speakers": "", "description": "Krystal Evans has previously appeared on BBC’s Comedy Underground, Scot Squad, Breaking the News, BBC New Comedy Award, Bad Influencer with Mark Nelson, and Socially Distant with Susan Calman. An American comedian based in the UK, Krystal's sharp cynicism and confidence on stage are loved by audiences and critics alike. \"An utterly beautiful show.\" ★★★★★ — Beyond the Joke", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41224", "item_id": "226", "offset": "220", "position": "90", "event_number": "Event [226]", "start_dt": "2026-05-24 22:30:00", "end_dt": "2026-05-24 23:30:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "11:00pm", "venue": "Blue Moon Tent", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41228", "item_id": "230", "offset": "224", "position": "94", "event_number": "Event [230]", "start_dt": "2026-05-24 23:00:00", "end_dt": "2026-05-25 00:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "11:00pm", "venue": "Cinema", "session_type": "DokBox", "session_type_class": "TT_color", "title": "Beyond Happily Ever After", "speakers": "", "description": "Why are so many Black women around the world choosing \"strategic singlehood\", redefining their happily ever after? Amanda Parris explores how capitalism, culture, and economics shape our understanding of relationships, intimacy, and what it truly means to be loved.", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41227", "item_id": "229", "offset": "223", "position": "93", "event_number": "Event [229]", "start_dt": "2026-05-24 23:00:00", "end_dt": "2026-05-25 00:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "11:00pm", "venue": "Hat", "session_type": "Music", "session_type_class": "ls_color", "title": "K.O.G Soundsystem", "speakers": "", "description": "Recently featured on Later… with Jools Holland, Kweku Sackey (K.O.G)'s prolific collaborations and high-energy storytelling continue to negotiate the space between the traditional and the modern. K.O.G is a \"multi-dimensional creative force,\" blending fierce raps and soulful vocals with shamanistic performance. Bridging African and Western sounds, the Accra-born artist has played Glastonbury’s West Holts and for Nelson Mandela’s family. “Ghana’s finest.” — Jools Holland", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41226", "item_id": "228", "offset": "222", "position": "92", "event_number": "Event [228]", "start_dt": "2026-05-24 23:00:00", "end_dt": "2026-05-25 00:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "11:30pm", "venue": "Stage", "session_type": "Cabaret", "session_type_class": "cab_color", "title": "Abigail Collins", "speakers": "", "description": "Hot foot from a globe-spanning run of shows, join Abigail Collins in the second of her cabaret spectaculars. Abigail has twice been nominated for Best Speciality Act at the London Cabaret Award and was crowned both Best Comic at the Milan Burlesque Awards and Best Actress at the Comedy Film Festival of America. Expect a dazzling solo whirlwind of mischief and mayhem. \"Beat-perfect delivery.\" — Erotic Review\"Absolutely brilliant.\" — Alan Davies", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41229", "item_id": "231", "offset": "225", "position": "95", "event_number": "Event [231]", "start_dt": "2026-05-24 23:30:00", "end_dt": "2026-05-25 00:30:00"}, {"day": "Sunday 24th May", "date": "Mon 25 May", "time": "12:00am", "venue": "Blue Moon Tent", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Jakey Boy Hughes", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41231", "item_id": "233", "offset": "227", "position": "97", "event_number": "Event [233]", "start_dt": "2026-05-25 00:00:00", "end_dt": "2026-05-25 01:00:00"}, {"day": "Sunday 24th May", "date": "Mon 25 May", "time": "12:00am", "venue": "Ring", "session_type": "Midnight Mayhem", "session_type_class": "mdm_color", "title": "A Horse-Sized Duck or 100 Duck-Sized Horses!", "speakers": "", "description": "With the festival taking place over the traditional Whitsun weekend, a time for wild festivities, join the debate at Midnight Mayhem. Speakers and comedians join forces in our late-night intellectual showdown with a twist. A Wicker Man-style, carnivalesque procession kicks off the show before audience members pick a side and make their voice heard alongside speakers and comedians from our star-studded programme.Alright... let's settle this once and for all. Would you rather fight a horse-sized duck or 100 duck-sized horses? No wrong answers... or rather, there are only wrong answers. It's one for the ages. Finally settled, by you, our star-studded audience, nowhere else but at HowTheLightGetsIn's infamous Midnight Mayhem.", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41230", "item_id": "232", "offset": "226", "position": "96", "event_number": "Event [232]", "start_dt": "2026-05-25 00:00:00", "end_dt": "2026-05-25 01:00:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "9:00am", "venue": "Inner Circle Tent", "session_type": "Inner Circle", "session_type_class": "ic_color", "title": "Philosophy Breakfast with Julie Bindel", "speakers": "Julie Bindel", "description": "Start your day with a shot of inspiration from your favourite speakers. Expect stimulating ideas along with fresh pastries and coffee.Sex, gender, and power remain among the most contested issues in public life. Join investigative journalist and long-standing feminist campaigner, Julie Bindel, to examine modern sex work, misogyny, and free speech in an era of polarised debate and cultural upheaval.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/philosophy-breakfast-with-julie-bindel-41276", "thumbnail_url": "./HTLGI_files/235-Julie-Bindel.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41276", "item_id": "235", "offset": "228", "position": "1", "event_number": "Event [235]", "start_dt": "2026-05-25 09:00:00", "end_dt": "2026-05-25 10:00:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "9:00am", "venue": "Inner Circle Tent", "session_type": "Inner Circle", "session_type_class": "ic_color", "title": "Philosophy Breakfast with Kishore Mahbubani", "speakers": "Kishore Mahbubani", "description": "Start your day with a shot of inspiration from your favourite speakers. Expect stimulating ideas along with fresh pastries and coffee.Global power is shifting away from the West. Join one of Asia’s most influential strategists and former UN diplomat, Kishore Mahbubani, to explore what a multipolar world means for democracy, prosperity, and how nations must adapt to a rapidly changing global order.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/philosophy-breakfast-with-kishore-mahbubani-41234", "thumbnail_url": "./HTLGI_files/236-Kishore-Mahbubani-2.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41234", "item_id": "236", "offset": "229", "position": "2", "event_number": "Event [236]", "start_dt": "2026-05-25 09:00:00", "end_dt": "2026-05-25 10:00:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "10:00am", "venue": "Academy", "session_type": "IAI Academy", "session_type_class": "AS_color", "title": "Liberalism, Post-Liberalism, and the New Political Order", "speakers": "Marlene Laruelle", "description": "", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/liberalism-post-liberalism-and-the-new-political-order-41236", "thumbnail_url": "./HTLGI_files/238-liberalism-post-liberalism-and-the-new-political-order.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41236", "item_id": "238", "offset": "231", "position": "4", "event_number": "Event [238]", "start_dt": "2026-05-25 10:00:00", "end_dt": "2026-05-25 11:00:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "10:00am", "venue": "Ring", "session_type": "Talks", "session_type_class": "tlk_color", "title": "Marx, Williams, and the Climate Crisis", "speakers": "John Merrick", "description": "The climate crisis can often feel like a purely modern phenomenon. But the great thinkers of the past may hold unmined wisdom and practical ideas for change. Join John Merrick, Deputy Editor of The Break-Down, to decipher how Raymond Williams’ Marx-influenced critique of industrial capitalism, culture, and democracy challenges extractive systems and centres questions of ecological and social justice, and how these ideas should be applied to today’s crisis.In partnership with The BREAK-DOWN", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/marx-williams-and-the-climate-crisis-41235", "thumbnail_url": "./HTLGI_files/237-marx-williams-and-the-climate-crisis.LOGO.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41235", "item_id": "237", "offset": "230", "position": "3", "event_number": "Event [237]", "start_dt": "2026-05-25 10:00:00", "end_dt": "2026-05-25 11:00:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "10:30am", "venue": "Arena", "session_type": "Debates", "session_type_class": "dnt_color", "title": "The Planck Paradox", "speakers": "Federico Faggin, Jonathan Oppenheim, Chiara Marletto, Tim Maudlin. Bjørn Ekeberg hosts", "description": "Nothing in our experience tells us there should be a smallest possible size. Yet modern physics assumes just such a limit: a minimum possible measure for any object. It was originally proposed by Max Planck, who argued that measurement becomes impossible below this limit. Now known as the Planck scale, it is central to both cosmology and particle physics. But Planck himself never believed his scale described nature; he saw it as a mathematical construction, and only later did others extend it into a physical boundary. Some now maintain spacetime is divided into Planck-sized units, but critics argue the scale relies on arbitrary constants and no experimental evidence has been found to support it. Is it a mistake to imagine there can be an ultimate limit to the parts of reality? Might the Planck scale be the result of a desire to end the mystery of reality as an endless series of Chinese boxes? Or did Planck uncover something necessary about the very structure of the universe?Theoretical physicist Jonathan Oppenheim, quantum theorist Chiara Marletto, microprocessor pioneer Federico Faggin, and philosopher of physics Tim Maudlin debate the Planck scale.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/the-planck-paradox-41237", "thumbnail_url": "./HTLGI_files/239-the-plank-paradox.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41237", "item_id": "239", "offset": "232", "position": "5", "event_number": "Event [239]", "start_dt": "2026-05-25 10:30:00", "end_dt": "2026-05-25 11:30:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "10:30am", "venue": "Hat", "session_type": "Hat Sessions", "session_type_class": "HS_color", "title": "Philosophy of the Senses: Our Inner Worlds", "speakers": "Barry C Smith", "description": "We’re taught that we have five senses, but what if we're missing the one that matters most: the one that looks inward? Beyond sight and sound lies interoception: a constant, subconscious monitoring of our internal organs and body. Known for his appearances on Masterchef and Radio 4’s The Kitchen Cabinet, join the founding director of the Centre for the Study of the Senses, Barry C. Smith, as he argues that these internal signals are the hidden drivers behind our moods, our decisions, and even our sense of self. By dismantling the \"five senses\" myth, Smith reveals how our heart, lungs, and gut expose hidden layers of reality that our ordinary senses miss.“Smith’s work restores wonder to the senses and wisdom to the philosopher’s palate.” — Philosophy Now", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/philosophy-of-the-senses-our-inner-worlds-41239", "thumbnail_url": "./HTLGI_files/241-philosophy-of-the-senses-our-inner-worlds.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41239", "item_id": "241", "offset": "234", "position": "7", "event_number": "Event [241]", "start_dt": "2026-05-25 10:30:00", "end_dt": "2026-05-25 11:30:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "10:30am", "venue": "International", "session_type": "Debates", "session_type_class": "dnt_color", "title": "New Rebels and A Failed Establishment", "speakers": "Matt Goodwin, Thangam Debbonaire, Eric Kaufmann, Louisa Munch. Mary Ann Sieghart hosts", "description": "Since the French revolution, politics in the West has identified the left as anti-establishment and the right in favour of the status quo. Young voters tend to be left wing and shift to the right as they get older. But there are signs that all these assumptions are in question. In France's latest elections, Le Pen got more youth votes than the left. In Germany the far-right AfD was the largest party amongst young voters. While in the last US presidential election, Trump's youth vote was a third higher than in 2020. Should these new rebels be listened to as a challenge to a failed establishment? Given historical parallels, is this a dangerous and naive response to economic weakness? Or does this indicate a disintegration of what it is to be right or left wing, as the mainstream left becomes associated with the status quo and the establishment?Reform UK candidate Matt Goodwin, Labour life peer Thangam Debbonaire, heterodox social scientist Eric Kaufmann, and critical theorist Louisa Munch lock horns over rebel politics.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/new-rebels-and-a-failed-establishment-41238", "thumbnail_url": "./HTLGI_files/240-new-rebels-and-a-failed-establishment-2.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41238", "item_id": "240", "offset": "233", "position": "6", "event_number": "Event [240]", "start_dt": "2026-05-25 10:30:00", "end_dt": "2026-05-25 11:30:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "11:00am", "venue": "Children's Tent", "session_type": "Children's Programme", "session_type_class": "chd_color", "title": "The Incredible Shrinking Machine", "speakers": "Peter Worley", "description": "What goes on in the incredible shrinking machine? Join 'The If Man', Peter Worley, to explore this and other unbelievable objects. Author of The If Machine, The If Odyssey, The Philosophy Shop, and 40 Lessons to Get Children Thinking, join Worley for The If Adventures, where fun can only be had only IF you are there.", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41241", "item_id": "243", "offset": "236", "position": "9", "event_number": "Event [243]", "start_dt": "2026-05-25 11:00:00", "end_dt": "2026-05-25 12:00:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "11:00am", "venue": "Inner Circle Tent", "session_type": "Inner Circle", "session_type_class": "ic_color", "title": "Philosophy Brunch with Simon Critchley", "speakers": "Simon Critchley", "description": "It's not every day you get to join a world-leading thinker for a delicious brunch. Avocado and eggs on toast never tasted so good. From medieval mystics to psychedelic seekers, experiences of transcendence have shaped humanity's search for meaning. Join philosopher and author of On Mysticism: The Experience of Ecstasy, Simon Critchley, to explore the experiences at the edge of what it means to be human.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/philosophy-brunch-with-simon-critchley-41242", "thumbnail_url": "./HTLGI_files/244-Simon-Critchley-2.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41242", "item_id": "244", "offset": "237", "position": "10", "event_number": "Event [244]", "start_dt": "2026-05-25 11:00:00", "end_dt": "2026-05-25 12:00:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "11:00am", "venue": "Inner Circle Tent", "session_type": "Inner Circle", "session_type_class": "ic_color", "title": "Philosophy Brunch with John Ralston Saul", "speakers": "John Ralston Saul", "description": "It's not every day you get to join a world-leading thinker for a delicious brunch. Avocado and eggs on toast never tasted so good. The old global order is breaking down, but what replaces it? Join former President of PEN International, John Ralston Saul, to explore geopolitics beyond empires and blocs, examining power, democracy, and why civic responsibility, not ideology, may shape a more stable international future.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/philosophy-brunch-with-john-ralston-saul-41243", "thumbnail_url": "./HTLGI_files/245-John-Ralston-Saul.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41243", "item_id": "245", "offset": "238", "position": "11", "event_number": "Event [245]", "start_dt": "2026-05-25 11:00:00", "end_dt": "2026-05-25 12:00:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "11:00am", "venue": "Ring", "session_type": "Talks", "session_type_class": "tlk_color", "title": "Reality Doesn't Care What You Think", "speakers": "Michael Shermer", "description": "Our culture has treated facts as narratives and truth as power. Join American sceptic Michael Shermer as he defends an ancient idea: reality exists independent of belief. Knowledge may be provisional, but it is not arbitrary. Science and reason remain our best tools for tracking a world that does not bend to ideology. Abandoning objective truth does not liberate us; it dissolves the ground for criticism, progress, and justice. Without facts, disagreement becomes noise rather than argument.\"One of our most influential intellectuals.\" — Robert Sapolsky", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/reality-doesnt-care-what-you-think-41240", "thumbnail_url": "./HTLGI_files/242-reality-doesnt-care-what-you-think.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41240", "item_id": "242", "offset": "235", "position": "8", "event_number": "Event [242]", "start_dt": "2026-05-25 11:00:00", "end_dt": "2026-05-25 12:00:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "11:15am", "venue": "Blue Moon Tent", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Mojam", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41244", "item_id": "246", "offset": "239", "position": "12", "event_number": "Event [246]", "start_dt": "2026-05-25 11:15:00", "end_dt": "2026-05-25 12:15:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "11:30am", "venue": "Hat", "session_type": "Hat Sessions", "session_type_class": "HS_color", "title": "Liberal Fascisms: Half-Lies and Double-Truths", "speakers": "Slavoj Žižek", "description": "We used to think liberalism and fascism were opposites. But now, they are feeding off each other. Join one of the most provocative and influential philosophers, Slavoj Žižek, as he turns his attention to the rise of ‘liberal fascism’. In typical fashion, Žižek explores the half-truths and the grip on power that survives by managing crises rather than solving them. In a world where truth is supposedly dead, Žižek contends we face a stark choice: radical honesty or an even more totalising lie. Join him as he interrogates the collapse of ideology and explores whether justice can survive in a world where the line between democratic freedom and authoritarian control has disappeared.\"The most formidably brilliant exponent of cultural theory to have emerged in Europe for decades.\" — Terry Eagleton", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/liberal-fascisms-half-lies-and-double-truths-41245", "thumbnail_url": "./HTLGI_files/247-liberal-fascisms-half-lies-and-double-truths.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41245", "item_id": "247", "offset": "240", "position": "13", "event_number": "Event [247]", "start_dt": "2026-05-25 11:30:00", "end_dt": "2026-05-25 12:30:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "11:30am", "venue": "Stage", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41246", "item_id": "248", "offset": "241", "position": "14", "event_number": "Event [248]", "start_dt": "2026-05-25 11:30:00", "end_dt": "2026-05-25 12:30:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "12:00pm", "venue": "Arena", "session_type": "Debates", "session_type_class": "dnt_color", "title": "Memes, Minds, and the Myth of Control", "speakers": "Victoria Trumbull, Tony D. Sampson, Sylvie Delacroix. Jonny Thomson hosts", "description": "We imagine ourselves as the initiators of ideas. Creativity and innovation take place in individual minds. Yet research from biology to psychology — from Richard Dawkins’ meme theory to Carl Jung’s archetypes — proposes instead that we act as hosts for ideas rather than creating them ourselves. Psychologists from Washington University describe ideas as spreading like “social contagions\"; once shared through enough of a network, they reinforce themselves, outpacing individual choice. Political ideologies, viral memes, and mass protests demonstrate this dynamic. Moreover, philosophers including Wittgenstein have argued that language is inherently social, suggesting that ideas are impossible in the minds of isolated individuals. Is it a mistake to see individuals as the origin of ideas and creativity, and if so, what are the consequences for how we think about freedom and politics? Can individuals, from Napoleon to Trump, Darwin to Einstein, change history, or are they merely conduits for cultural movements that would happen with or without them? And if we are vehicles for ideas, how should we respond when the ones that possess us become destructive?Philosopher of mind Victoria Trumbull, digital ethicist Sylvie Delacroix, and digital theorist Tony D. Sampson whether ideas have minds of their own. In partnership with Big Think", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/memes-minds-and-the-myth-of-control-41247", "thumbnail_url": "./HTLGI_files/249-memes-minds-and-the-myth-of-control.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41247", "item_id": "249", "offset": "242", "position": "15", "event_number": "Event [249]", "start_dt": "2026-05-25 12:00:00", "end_dt": "2026-05-25 13:00:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "12:00pm", "venue": "Children's Tent", "session_type": "Children's Programme", "session_type_class": "chd_color", "title": "The Prince, the Fox, and the Art of Friendship", "speakers": "Alexandra Konoplyanik", "description": "Meet the Little Prince's friend, the Fox, and explore with philosopher Alexandra Konoplyanik what it means to be a true friend. Puzzle over important human questions from Antoine de Saint-Exupéry's delightful book in the company of other young, curious minds, and find out where your own extraordinary thinking takes you.", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41250", "item_id": "252", "offset": "245", "position": "18", "event_number": "Event [252]", "start_dt": "2026-05-25 12:00:00", "end_dt": "2026-05-25 13:00:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "12:00pm", "venue": "International", "session_type": "Debates", "session_type_class": "dnt_color", "title": "The Edge of the Known", "speakers": "Jessica Frazier, Hilary Lawson. Shahidha Bari hosts", "description": "For centuries in the West, we believed knowledge was infinitely extendable, its limits nothing more than the edges of a map waiting to be filled in. The Enlightenment reinforced the conviction that reason would progressively extend the edges of our world, unveiling every mystery. But today this optimism is under pressure. Physicists from Heisenberg to Hawking have abandoned the idea that science can escape models of the universe to uncover an ultimate account. Philosophers, anthropologists, and sociologists have identified the constraints physiology, language, and culture pose to our complete understanding of the world. Have we exchanged a world where the limits of knowledge were at the edges of our understanding, for a world in which there is no knowledge at all? And if so, should we give up on knowledge in favour of frameworks that enable us to achieve outcomes we desire? Or is it vital to distinguish between the true and the false, the known and the unknown?Post-postmodern philosopher Hilary Lawson and Oxford philosopher Jessica Frazier debate whether the idea of knowledge is worth salvaging.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/the-edge-of-the-known-41248", "thumbnail_url": "./HTLGI_files/250-the-edge-of-the-known.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41248", "item_id": "250", "offset": "243", "position": "16", "event_number": "Event [250]", "start_dt": "2026-05-25 12:00:00", "end_dt": "2026-05-25 13:00:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "12:00pm", "venue": "Ring", "session_type": "Talks", "session_type_class": "tlk_color", "title": "Free Will Is Real", "speakers": "George Ellis", "description": "Modern science has begun to treat free will as a comforting illusion. Join leading cosmologist and collaborator of Stephen Hawking, George Ellis, as he argues that this is a mistake. Free will is real. He argues that genuine choice emerges from complex systems, where causation runs both upward and downward. The initial conditions of the universe did not embed iPhones or Boeing 747s; they can only have been the product of human choices. Ellis insists that true science leaves room for intention, accountability, and free will.\"Among a handful of the world’s leading relativistic cosmologists.\" — The Templeton Prize", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/free-will-is-real-41249", "thumbnail_url": "./HTLGI_files/251-free-will-is-real.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41249", "item_id": "251", "offset": "244", "position": "17", "event_number": "Event [251]", "start_dt": "2026-05-25 12:00:00", "end_dt": "2026-05-25 13:00:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "12:15pm", "venue": "Blue Moon Tent", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41251", "item_id": "253", "offset": "246", "position": "19", "event_number": "Event [253]", "start_dt": "2026-05-25 12:15:00", "end_dt": "2026-05-25 13:15:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "12:30pm", "venue": "Hat", "session_type": "Debates", "session_type_class": "dnt_color", "title": "A New Story of Humanity", "speakers": "Kishore Mahbubani, Eric Kaufmann, Martha Fiennes, Maureen Dowd. Philip Collins hosts", "description": "From Shakespeare to Hollywood, Bach to Beyonce, we've assumed Western culture dominates the globe. But many argue this dominance is over. Bollywood overtook Hollywood in film output decades ago, while China now has the world’s second-largest movie market. YouTube, an American company, remains the world’s largest video platform, but Chinese-owned TikTok is second, with more than 1.5 billion monthly users. Subtitles and algorithms mean a shared language is no longer required for culture to travel globally. From K-pop to Squid Game, Korean content has found global reach. Set against a history in which India and China were for millenia the world's largest and most advanced cultures, some maintain Western cultural dominance is little more than a short term historical blip.Should we see the future as a relentless decline of Western soft power and cultural influence? Will a new story of humanity be written by other cultures? Or can the West's values and influence survive even if it is no longer economically dominant? Author of Has China Won? Kishore Mahbubani, critic of \"woke\" culture Eric Kaufmann, award-winning director Martha Fiennes, and NYT columnist Maureen Dowd debate the human story.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/a-new-story-of-humanity-41252", "thumbnail_url": "./HTLGI_files/254-A-New-Story-of-Humanity.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41252", "item_id": "254", "offset": "247", "position": "20", "event_number": "Event [254]", "start_dt": "2026-05-25 12:30:00", "end_dt": "2026-05-25 13:30:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "12:30pm", "venue": "Stage", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Rosie With Words", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41253", "item_id": "255", "offset": "248", "position": "21", "event_number": "Event [255]", "start_dt": "2026-05-25 12:30:00", "end_dt": "2026-05-25 13:30:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "1:00pm", "venue": "Children's Tent", "session_type": "Children's Programme", "session_type_class": "chd_color", "title": "The Magic of Words", "speakers": "Matilda Atkins", "description": "The Magic Dictionary decides what's nonsense and what has meaning. So, what is a word? Who gets to invent them? And what would happen if a word suddenly vanished? Join philosopher Matilda Atkins' fun and interactive session about the power of language, as we play with words and discover how they shape the world we live in.", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41255", "item_id": "257", "offset": "250", "position": "23", "event_number": "Event [257]", "start_dt": "2026-05-25 13:00:00", "end_dt": "2026-05-25 14:00:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "1:00pm", "venue": "Inner Circle Tent", "session_type": "Inner Circle", "session_type_class": "ic_color", "title": "Philosophy Lunch with Laura Grego", "speakers": "Laura Grego", "description": "Your opportunity to enjoy a delicious lunch with our inspiring speakers and award-winning wine. Space is no longer a distant frontier but a fragile battleground. Join Laura Grego, leading space policy expert, to explore escalating risks in orbit, where rivalry and miscalculation could trigger cascading crises, asking whether a new “Star Wars” era threatens stability here on Earth.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/philosophy-lunch-with-laura-grego-41256", "thumbnail_url": "./HTLGI_files/258-Laura-Grego.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41256", "item_id": "258", "offset": "251", "position": "24", "event_number": "Event [258]", "start_dt": "2026-05-25 13:00:00", "end_dt": "2026-05-25 13:15:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "1:00pm", "venue": "Ring", "session_type": "Talks", "session_type_class": "tlk_color", "title": "Physics Has Misunderstood Time", "speakers": "Avshalom Elitzur", "description": "Time, we are told by most physicists, does not truly flow; its apparent passage dismissed as a human illusion. Join creator of the Elitzur–Vaidman bomb tester, quantum physicist Avshalom Elitzur, as he challenges that orthodoxy. Rather than burying the lived sense of becoming beneath abstract equations, he explores research uncovering a subtle sub-quantum realm where time is the most basic ingredient of the universe. If time’s flow is fundamental, then physics itself may need redesigning. “A quantum leader.” — Perimeter Institute", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/physics-has-misunderstood-time-41254", "thumbnail_url": "./HTLGI_files/256-physics-has-misunderstood-time.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41254", "item_id": "256", "offset": "249", "position": "22", "event_number": "Event [256]", "start_dt": "2026-05-25 13:00:00", "end_dt": "2026-05-25 14:00:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "1:15pm", "venue": "Arena", "session_type": "Debates", "session_type_class": "dnt_color", "title": "The Mystery of the Self and the Body", "speakers": "Slavoj Žižek, Federico Faggin, Monima Chadha, Martine Nida-Rümelin. Jay Shapiro hosts", "description": "Modern Western thought is often seen as beginning with Descartes and the notion that the thinking self and the physical body are fundamentally distinct substances. But this makes a mystery of how one affects the other, and many have sought to get rid of the two substances in favour of a single underlying stuff of the universe. The Western scientific tradition has favoured the physical, often denying the self altogether, while idealists and some Eastern traditions have focused on consciousness, sometimes denying the physical. But in a world with a single sort of 'stuff', be it physical or mental, human experience becomes inexplicable since it requires both a subject that has experience and something other that is experienced. Do we have to accept that a single substance, both in its materialist Western form, or in its Eastern idealist form, is mistaken? Should we return to dualism or adopt a Buddhist stance of abandoning all categories in favour of flux and process? Or must the world consist of one substance, and materialism capable of explaining thought, or idealism capable of accounting for the physical?Firebrand philosopher Slavoj Žižek, physicist, engineer, and consciousness researcher Federico Faggin, dualist Martine Nida-Rümelin, and Oxford professor of Indian philosophy Monima Chadha debate the self and the body.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/the-mystery-of-the-self-and-the-body-41257", "thumbnail_url": "./HTLGI_files/259-the-mystery-of-the-self-and-the-body.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41257", "item_id": "259", "offset": "252", "position": "25", "event_number": "Event [259]", "start_dt": "2026-05-25 13:15:00", "end_dt": "2026-05-25 14:15:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "1:15pm", "venue": "Blue Moon Tent", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Tim 'The Gardener'", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41260", "item_id": "262", "offset": "255", "position": "28", "event_number": "Event [262]", "start_dt": "2026-05-25 13:15:00", "end_dt": "2026-05-25 14:15:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "1:15pm", "venue": "Inner Circle Tent", "session_type": "Inner Circle", "session_type_class": "ic_color", "title": "Philosophy Lunch with Louisa Munch", "speakers": "Louisa Munch", "description": "Your opportunity to enjoy a delicious lunch with our inspiring speakers and award-winning wine. Social media is changing who gets to speak and be heard. Join Louisa Munch, TikTok academic and digital culture researcher, to explore influence, identity, and how platforms are reshaping expertise, authority, and the way knowledge circulates today.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/philosophy-lunch-with-louisa-munch-41259", "thumbnail_url": "./HTLGI_files/261-Louisa-Munch.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41259", "item_id": "261", "offset": "254", "position": "27", "event_number": "Event [261]", "start_dt": "2026-05-25 13:15:00", "end_dt": "2026-05-25 14:15:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "1:15pm", "venue": "International", "session_type": "Debates", "session_type_class": "dnt_color", "title": "The Return of the Grand Narrative", "speakers": "Steve Fuller, Michael Shermer, Chiara Marletto. Jack Symes hosts", "description": "Lyotard called the end to grand narratives, the end to the possibility of a single overall account of the human condition, be it religion, Marxism, liberal democracy, or the Enlightenment. He went on to argue that \"grand narratives have always been in conflict with science\". But increasingly, critics argue science has given rise to its own grand narratives, with uncanny similarities to those it displaced. The sense of mystery and awe implicit in many religions now finds its parallel in the ineffable vastness of the universe. The Marxist unfolding of history has echoes in the unavoidable consequence of the initial conditions in Einsteinian physics. While the Genesis story has direct parallels with the Big Bang, a theory first put forward by a Catholic priest. Rather than replacing grand narratives, have we just conjured up new versions? Is there a danger that the scientific narratives of today carry the same risks as the ideologies of the past? At root, why are we attached to these tales, and could we even, in principle, get rid of them?American sceptic Michael Shermer, theoretical physicist Chiara Marletto, and post-truth philosopher Steve Fuller debate the grand narratives we live by today.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/the-return-of-the-grand-narrative-41258", "thumbnail_url": "./HTLGI_files/260-The-Return-of-the-Grand-Narrative.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41258", "item_id": "260", "offset": "253", "position": "26", "event_number": "Event [260]", "start_dt": "2026-05-25 13:15:00", "end_dt": "2026-05-25 14:15:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "1:30pm", "venue": "Academy", "session_type": "IAI Academy", "session_type_class": "AS_color", "title": "The Philosophical Consequences of Darwin", "speakers": "Samir Okasha", "description": "Despite the radical change inaugurated by Darwin’s theory of evolution, philosophers have long ignored the theory’s implications for philosophy. According to University of Bristol professor and Lakotos Award winner, Samir Okasha, this is a profound mistake. If human beings are products of natural selection, then our ethical intuitions, political institutions, and cognitive faculties themselves also have evolutionary histories. With an evolutionary lens, he illuminates age-old debates about altruism and cooperation, the objectivity of ethics, and whether human reason is designed to track truth or simply to enhance survival.Part One: Morality and Cooperation: Is Ethics an Evolutionary Adaptation?Part Two: Reason and Reality: Can an Evolved Mind Discover Objective Truth?", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/the-philosophical-consequences-of-darwin-41262", "thumbnail_url": "./HTLGI_files/264-The-philosophical-consequences-of-darwin.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41262", "item_id": "264", "offset": "257", "position": "30", "event_number": "Event [264]", "start_dt": "2026-05-25 13:30:00", "end_dt": "2026-05-25 14:30:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "1:30pm", "venue": "Cinema", "session_type": "DokBox", "session_type_class": "TT_color", "title": "Quiet the Sirens", "speakers": "", "description": "Psychedelic-assisted therapy is reshaping the field of trauma recovery. Discover the history of psychotherapy and follow firefighters as they recover from PTSD using cutting-edge ketamine treatments. Featuring experts, including Bessel van der Kolk, author of the bestselling The Body Keeps the Score.", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41263", "item_id": "265", "offset": "258", "position": "31", "event_number": "Event [265]", "start_dt": "2026-05-25 13:30:00", "end_dt": "2026-05-25 14:30:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "1:30pm", "venue": "Stage", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Delphis", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41261", "item_id": "263", "offset": "256", "position": "29", "event_number": "Event [263]", "start_dt": "2026-05-25 13:30:00", "end_dt": "2026-05-25 14:30:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "2:00pm", "venue": "Hat", "session_type": "Hat Sessions", "session_type_class": "HS_color" e live.\"This man knows the secret to happiness.\" — Wired UK", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/the-science-of-happiness-41264", "thumbnail_url": "./HTLGI_files/266-the-science-of-happiness.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41264", "item_id": "266", "offset": "259", "position": "32", "event_number": "Event [266]", "start_dt": "2026-05-25 14:00:00", "end_dt": "2026-05-25 15:00:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "2:15pm", "venue": "Blue Moon Tent", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Delphis", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41266", "item_id": "268", "offset": "261", "position": "34", "event_number": "Event [268]", "start_dt": "2026-05-25 14:15:00", "end_dt": "2026-05-25 15:15:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "2:30pm", "venue": "Arena", "session_type": "Debates", "session_type_class": "dnt_color", "title": "Closer to the Truth", "speakers": "Cheryl Misak, Tim Maudlin, Steve Fuller. Jessica Frazier hosts", "description": "Although many question whether science is capable of providing a complete account of reality, most see our theories, from Newton to Einstein to quantum mechanics, as becoming steadily more correct. But can we make sense of getting closer to the truth if we do not know what a final theory looks like? In ancient times, Ptolemy refined the Aristotelian account of the heavens, in which stars were carried on giant celestial spheres, but we do not see him as getting closer to the truth – since we regard the whole framework as nonsense. Thomas Kuhn argued the same is true of our current theories, since they operate within an overall paradigm which might be entirely overthrown in th ", "offset": "269", "position": "42", "event_number": "Event [276]", "start_dt": "2026-05-25 15:30:00", "end_dt": "2026-05-25 16:30:00"}, {"day": "Monday 25th May", "date": "Mon 25 May", "time": "4:00pm", "venue": "Arena", "session_type": "Music", "session_type_class": "ls_color", "title": "Blaenavon Male Voice Choir", "speakers": "", "description": "There’s a time for tradition. Each year since 2009, the wonderfully magical Blaenavon Male Voice Choir have closed the HowTheLightGetsIn festival. And there’s never a dry eye – or spare inch – in the house. Founded over a century ago in 1910, the premier Welsh choir is still going strong and has toured the world to international acclaim. Prepare to be moved. \"Show-stopping. Could move a nation.\" — LA Times", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41275", "item_id": "277", "offset": "270", "position": "43", "event_number": "Event [277]", "start_dt": "2026-05-25 16:00:00", "end_dt": "2026-05-25 17:00:00"}];
const COLORS = {"ls_color": "#E84444", "ds_color": "#FF8C42", "ic_color": "#9B59B6", "tlk_color": "#3498DB", "dnt_color": "#27AE60", "HS_color": "#16A085", "TT_color": "#5D6D7E", "LNS_color": "#F1C40F", "cab_color": "#C0392B", "bq_color": "#A0522D", "dis_color": "#FF5722", "chd_color": "#66BB6A", "AS_color": "#546E7A", "mdm_color": "#6C3483"};
const VORDER = ["Arena", "International", "Ring", "Hat", "Stage", "Inner Circle Tent", "Academy", "Blue Moon Tent", "Children's Tent", "Cinema", "Waterfront", "Disco"];
const DEFAULT_HIDDEN = new Set(["chd_color", "ic_color", "bq_color", "mdm_color", "dis_color", "cab_color"]);

const DAYS = [
  {lbl:'Friday 22nd',  s:'2026-05-22T05:00:00', e:'2026-05-23T05:00:00'},
  {lbl:'Saturday 23rd',s:'2026-05-23T05:00:00', e:'2026-05-24T05:00:00'},
  {lbl:'Sunday 24th',  s:'2026-05-24T05:00:00', e:'2026-05-25T05:00:00'},
  {lbl:'Monday 25th',  s:'2026-05-25T05:00:00', e:'2026-05-26T05:00:00'},
];

const evts = ALL.map(r=>{
  const sm = new Date(r.start_dt.replace(' ','T')).getTime();
  const em = new Date(r.end_dt.replace(' ','T')).getTime();
  return {...r, sm, em, color: COLORS[r.session_type_class]||'#888'};
});

// Unique types in stable order
const TYPE_LIST = [];
const _seen = new Set();
evts.forEach(e=>{
  if(!_seen.has(e.session_type_class)){
    _seen.add(e.session_type_class);
    TYPE_LIST.push({cls:e.session_type_class, lbl:e.session_type, color:COLORS[e.session_type_class]||'#888'});
  }
});
TYPE_LIST.sort((a,b)=>a.lbl.localeCompare(b.lbl));

const _today = new Date();
const _todayStr = `${_today.getFullYear()}-${String(_today.getMonth()+1).padStart(2,'0')}-${String(_today.getDate()).padStart(2,'0')}`;
let activeDay = Math.max(0, DAYS.findIndex(d => d.s.startsWith(_todayStr)));
const hidden = new Set(DEFAULT_HIDDEN);

const ROW_H = 60;   // row height px
const TH_H  = 40;   // time-header height px
const PPH   = 160;  // px per hour — wide so titles are visible

function ft(ms){
  const d=new Date(ms), h=d.getHours(), m=d.getMinutes();
  const ap=h>=12?'pm':'am', hh=h%12||12;
  return m?`${hh}:${String(m).padStart(2,'0')}${ap}`:`${hh}${ap}`;
}
function fdur(s,e){
  const mn=Math.round((e-s)/60000), h=Math.floor(mn/60), m=mn%60;
  return h?(m?`${h}h ${m}m`:`${h}h`):`${m}m`;
}

function renderTabs(){
  document.getElementById('dayTabs').innerHTML=DAYS.map((d,i)=>
    `<div class="day-tab${i===activeDay?' active':''}" onclick="setDay(${i})">${d.lbl}</div>`
  ).join('');
}

function renderFilters(){
  const bar=document.getElementById('filterBar');
  bar.innerHTML='<span class="f-lbl">Show:</span>'+TYPE_LIST.map(t=>
    `<div class="ttoggle${hidden.has(t.cls)?' off':''}"
      style="background:${t.color}1a;color:${t.color};border-color:${t.color}55"
      onclick="tog('${t.cls}')">${t.lbl}</div>`
  ).join('');
}

function setDay(i){activeDay=i;renderTabs();render();}
function tog(cls){hidden.has(cls)?hidden.delete(cls):hidden.add(cls);renderFilters();render();}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(){
  const day=DAYS[activeDay];
  const ds=new Date(day.s).getTime(), de=new Date(day.e).getTime();

  const dayEvts=evts.filter(e=>e.sm<de&&e.em>ds&&!hidden.has(e.session_type_class));
  const venues=VORDER.filter(v=>dayEvts.some(e=>e.venue===v));

  // Compute visible time window
  let vs=ds, ve=de;
  if(dayEvts.length){
    const minS=Math.min(...dayEvts.map(e=>e.sm));
    const maxE=Math.max(...dayEvts.map(e=>e.em));
    const sd=new Date(minS); sd.setMinutes(0,0,0);
    vs=Math.max(ds,sd.getTime());
    const ed=new Date(maxE);
    if(ed.getMinutes()||ed.getSeconds()){ed.setHours(ed.getHours()+1,0,0,0);}
    ve=Math.min(de,ed.getTime());
  }

  const totalH=(ve-vs)/3600000;
  const svgW=Math.max(600, Math.ceil(totalH*PPH));
  const barsH=venues.length*ROW_H;

  // Venue column (row 2, col 1)
  document.getElementById('venueCol').innerHTML=
    venues.map(v=>`<div class="vc">${esc(v)}</div>`).join('');

  if(!dayEvts.length){
    document.getElementById('timeHeader').innerHTML='';
    document.getElementById('ganttCol').innerHTML='<div class="no-ev">No events match the current filters.</div>';
    return;
  }

  const vmap=Object.fromEntries(venues.map((v,i)=>[v,i]));
  const hourStep=totalH>22?2:1;

  let bgs='',vlines='',xlbls='',bars='';

  // Row backgrounds (y=0 based, no time-header offset)
  venues.forEach((v,ri)=>{
    const y=ri*ROW_H;
    bgs+=`<rect x="0" y="${y}" width="${svgW}" height="${ROW_H}" fill="${ri%2?'#191924':'#1e1e2c'}"/>`;
    if(ri>0) bgs+=`<line x1="0" y1="${y}" x2="${svgW}" y2="${y}" stroke="#1c1c2a" stroke-width="1"/>`;
  });

  // Vertical time grid + header labels
  for(let h=0;h<=totalH;h+=hourStep){
    const x=Math.round(h*PPH);
    const t=new Date(vs+h*3600000);
    const hh=t.getHours(), mn=t.getMinutes();
    const lbl=mn?`${hh}:${String(mn).padStart(2,'0')}`:
      (hh===0?'12am':hh<12?`${hh}am`:hh===12?'12pm':`${hh-12}pm`);
    vlines+=`<line x1="${x}" y1="0" x2="${x}" y2="${barsH}" stroke="#252535" stroke-width="1"/>`;
    xlbls+=`<text x="${x+4}" y="26" fill="#505070" font-size="12"
      font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">${lbl}</text>`;
  }

  // Event bars — click only, text wraps via foreignObject
  dayEvts.forEach(e=>{
    const ri=vmap[e.venue];
    if(ri===undefined)return;
    const x0=(Math.max(e.sm,vs)-vs)/3600000*PPH;
    const x1=(Math.min(e.em,ve)-vs)/3600000*PPH;
    const bw=Math.max(4,x1-x0-2);
    const by=ri*ROW_H+5;
    const bh=ROW_H-10;
    const title=esc(e.title||'');

    bars+=`<rect rx="5" x="${x0+1}" y="${by}" width="${Math.max(3,bw-2)}" height="${bh}"
      fill="${e.color}" fill-opacity=".85" style="cursor:pointer;transition:filter .1s"
      data-id="${esc(e.item_id)}"
      onclick="openModal('${e.item_id}')"
      onmousedown="this.style.filter='brightness(1.25)'"
      onmouseup="this.style.filter=''"
      onmouseleave="this.style.filter=''"/>`;

    if(bw>28){
      const foW=Math.max(0,bw-10);
      bars+=`<foreignObject x="${x0+5}" y="${by}" width="${foW}" height="${bh}" pointer-events="none">
<div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;">
<span style="font-size:11px;font-weight:500;color:rgba(255,255,255,.93);line-height:1.3;word-break:break-word;overflow:hidden;text-align:center;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:3;">${title}</span>
</div>
</foreignObject>`;
    }
  });

  // Time header SVG (row 1, col 2) — sticky top
  document.getElementById('timeHeader').innerHTML=`
<svg width="${svgW}" height="${TH_H}" style="display:block">
  <rect width="${svgW}" height="${TH_H}" fill="#111118"/>
  ${xlbls}
</svg>`;

  // Bars SVG (row 2, col 2)
  document.getElementById('ganttCol').innerHTML=`
<svg width="${svgW}" height="${barsH}" style="display:block">
  <rect width="${svgW}" height="${barsH}" fill="#1e1e2c"/>
  ${bgs}${vlines}${bars}
</svg>`;

  // Scroll to first event
  requestAnimationFrame(()=>{
    const scroll=document.getElementById('chartScroll');
    if(dayEvts.length){
      const firstX=(Math.min(...dayEvts.map(e=>e.sm))-vs)/3600000*PPH;
      scroll.scrollLeft=Math.max(0,firstX-40);
    }
  });
}

// ── Modal ──
function openModal(id){
  const e=evts.find(x=>String(x.item_id)===String(id));
  if(!e)return;

  // Text column — always shown first / fully
  let textHtml='';
  textHtml+=`<div class="m-badge" style="background:${e.color}33;color:${e.color}">${esc(e.session_type)}</div>`;
  textHtml+=`<div class="m-title">${esc(e.title||'(Untitled)')}</div>`;
  textHtml+=`<div class="m-meta">📍 ${esc(e.venue)}</div>`;
  textHtml+=`<div class="m-meta">🕐 ${ft(e.sm)} – ${ft(e.em)} · ${fdur(e.sm,e.em)}</div>`;
  if(e.date&&e.date.trim()) textHtml+=`<div class="m-meta">📅 ${esc(e.date)}</div>`;
  if(e.speakers&&e.speakers.trim()) textHtml+=`<div class="m-spk">${esc(e.speakers)}</div>`;
  if(e.description&&e.description.trim()) textHtml+=`<div class="m-desc">${esc(e.description)}</div>`;
  if(e.fast_passes_status&&e.fast_passes_status.trim()) textHtml+=`<div class="m-fp">⚡ ${esc(e.fast_passes_status)}</div>`;

  // Image column — right side, optional
  const hasThumb = e.thumbnail_url&&e.thumbnail_url.trim();
  const imgHtml = hasThumb
    ? `<div class="m-image"><img src="${esc(e.thumbnail_url.trim())}" onerror="this.parentElement.style.display='none'" alt=""></div>`
    : '';

  // Links below the layout row
  const lnks=[];
  if(e.event_url&&e.event_url.trim()) lnks.push(`<a class="m-lnk ev" href="${esc(e.event_url)}" target="_blank">More info ↗</a>`);
  if(e.ticket_url&&e.ticket_url.trim()) lnks.push(`<a class="m-lnk tk" href="${esc(e.ticket_url)}" target="_blank">Tickets ↗</a>`);
  const linksHtml = lnks.length ? `<div class="m-links">${lnks.join('')}</div>` : '';

  document.getElementById('modal-body').innerHTML=
    `<div class="m-layout"><div class="m-text">${textHtml}</div>${imgHtml}</div>${linksHtml}`;
  document.getElementById('modal-card').scrollTop=0;
  document.getElementById('modal-overlay').classList.add('vis');
}

function closeModal(ev){
  if(ev.target===document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect(){
  document.getElementById('modal-overlay').classList.remove('vis');
}
document.addEventListener('keydown',ev=>{if(ev.key==='Escape') closeModalDirect();});

function toggleUI(){
  const hidden = document.body.classList.toggle('ui-hidden');
  document.getElementById('collapseBtn').textContent = hidden ? '⌄ Show' : '⌃ Hide';
}

renderTabs(); renderFilters(); render();
</script>
