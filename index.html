<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HowTheLightGetsIn 2026 – Schedule</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0e0e14;color:#e8e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;overflow:hidden}

/* ── Header ── */
#hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding:14px 20px 10px;border-bottom:1px solid #1e1e2e;flex-shrink:0}
#hdr h1{font-size:1.3rem;font-weight:700;color:#fff;letter-spacing:.04em}
#hdr .sub{font-size:.72rem;color:#666;margin-top:2px}
.hide-btn{background:#1e1e2c;border:1px solid #2e2e4e;color:#888;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.8rem;font-weight:600;white-space:nowrap;transition:color .12s,background .12s}
.hide-btn:hover{color:#ccc;background:#252538}

/* ── Day tabs row ── */
#navRow{display:flex;align-items:flex-end;border-bottom:1px solid #1a1a24;flex-shrink:0}
#dayTabs{display:flex;gap:4px;padding:10px 16px 0;flex:1;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none}
#dayTabs::-webkit-scrollbar{display:none}
.day-tab{padding:8px 16px;border-radius:8px 8px 0 0;cursor:pointer;font-size:.82rem;font-weight:600;color:#666;background:#16161f;border:1px solid #272738;border-bottom:none;transition:color .12s,background .12s;line-height:1;white-space:nowrap;flex-shrink:0}
.day-tab.active{color:#e8e8f0;background:#1e1e2c;border-color:#3a3a5a}
.day-tab:hover:not(.active){color:#bbb;background:#1a1a26}

/* ── Filter bar ── */
#filterBar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:8px 20px;background:#1a1a26;border-bottom:1px solid #222234;flex-shrink:0}
.f-lbl{font-size:.7rem;color:#555;margin-right:2px;white-space:nowrap}
.ttoggle{padding:4px 10px;border-radius:20px;cursor:pointer;font-size:.72rem;font-weight:600;border:1.5px solid transparent;transition:opacity .12s;white-space:nowrap;user-select:none;line-height:1.4}
.ttoggle.off{opacity:.28}

/* ── Collapsed state — hide header + day tabs + filters ── */
body.ui-hidden #hdr{display:none}
body.ui-hidden #navRow{display:none}
body.ui-hidden #filterBar{display:none}

/* ── Chart layout ── */
#chartArea{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0}
#chartScroll{flex:1;overflow:auto}
/* 2-column grid: frozen venue col | scrolling gantt col */
#chartGrid{display:grid;grid-template-columns:108px auto;width:max-content;min-width:100%}

/* Corner cell: sticky top-left, holds toggle button */
#cornerCell{
  grid-column:1;grid-row:1;
  position:sticky;left:0;top:0;z-index:20;
  width:108px;height:40px;
  background:#0d0d14;
  border-right:1px solid #252535;
  border-bottom:1px solid #2a2a40;
  display:flex;align-items:center;justify-content:center;
  padding:0 6px;
}
#collapseBtn{
  background:#1a1a2c;border:1px solid #2e2e4e;color:#888;
  border-radius:6px;padding:3px 7px;cursor:pointer;
  font-size:.68rem;font-weight:600;line-height:1.4;
  transition:color .12s,background .12s;white-space:nowrap;flex-shrink:0;
}
#collapseBtn:hover{color:#ccc;background:#252538}
body.ui-hidden #collapseBtn{color:#3a9eff;border-color:#2a4a7a}

/* Time header: sticky top, scrolls horizontally with the gantt */
#timeHeader{
  grid-column:2;grid-row:1;
  position:sticky;top:0;z-index:15;
  background:#111118;
  border-bottom:1px solid #2a2a40;
  line-height:0;
}

/* Venue col: sticky left, scrolls vertically with bars */
#venueCol{
  grid-column:1;grid-row:2;
  position:sticky;left:0;z-index:10;
  width:108px;background:#111118;
  border-right:1px solid #252535;
}
.vc{height:60px;display:flex;align-items:center;padding:0 8px;font-size:.74rem;color:#bbb;font-weight:500;border-bottom:1px solid #191926;word-break:break-word;overflow:hidden;line-height:1.3}

/* Gantt bars col */
#ganttCol{grid-column:2;grid-row:2;line-height:0}

/* ── Modal overlay ── */
#modal-overlay{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(3px);
  -webkit-backdrop-filter:blur(3px);
  align-items:flex-start;justify-content:center;
  padding:12px 16px 24px;
  overflow-y:auto;
}
#modal-overlay.vis{display:flex}
#modal-card{
  background:#141420;border:1px solid #363660;border-radius:16px;
  width:100%;max-width:520px;
  max-height:calc(100dvh - 36px);
  overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.9);
  position:relative;flex-shrink:0;
}
#modal-card::-webkit-scrollbar{width:5px}
#modal-card::-webkit-scrollbar-thumb{background:#333355;border-radius:4px}
.m-close{
  position:sticky;top:0;z-index:10;
  display:flex;justify-content:flex-end;
  padding:12px 14px 0;
  background:linear-gradient(#141420 80%,transparent);
}
.m-close button{
  background:#222238;border:1px solid #383860;color:#aaa;
  border-radius:8px;padding:6px 14px;cursor:pointer;font-size:.82rem;font-weight:600;
  line-height:1;
}
.m-close button:hover{background:#2a2a50;color:#fff}
.m-body{padding:0 18px 22px}
/* side-by-side: text left, image right */
.m-layout{display:flex;gap:12px;align-items:flex-start}
.m-text{flex:1;min-width:0}
.m-image{flex-shrink:0;width:110px}
.m-image img{width:100%;border-radius:8px;display:block;object-fit:cover}
.m-badge{display:inline-block;padding:3px 10px;border-radius:14px;font-size:.7rem;font-weight:700;color:#fff;margin-bottom:8px}
.m-title{font-size:1.05rem;font-weight:700;color:#fff;margin-bottom:5px;line-height:1.3}
.m-meta{font-size:.78rem;color:#777;margin-bottom:4px;line-height:1.5}
.m-spk{font-size:.78rem;color:#aaa;font-style:italic;margin-bottom:8px;line-height:1.4}
.m-desc{font-size:.78rem;color:#999;line-height:1.6;margin-bottom:10px}
.m-fp{font-size:.72rem;color:#f1c40f;margin-bottom:8px}
.m-links{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.m-lnk{font-size:.8rem;padding:9px 18px;border-radius:8px;text-decoration:none;font-weight:600;text-align:center;flex:1;min-width:110px}
.m-lnk.ev{background:#1e2a50;color:#7a9fff;border:1px solid #2a3a70}
.m-lnk.tk{background:#1a3a1a;color:#7aee9f;border:1px solid #2a5a2a}
.m-lnk:hover{filter:brightness(1.2)}

.no-ev{padding:40px;text-align:center;color:#444;font-size:.88rem}

/* Scrollbar for chart */
#chartScroll::-webkit-scrollbar{height:7px;width:7px}
#chartScroll::-webkit-scrollbar-track{background:#0e0e14}
#chartScroll::-webkit-scrollbar-thumb{background:#2e2e4e;border-radius:4px}
</style>
</head>

 May", "time": "9:00am", "venue": "Inner Circle Tent", "session_type": "Inner Circle", "session_type_class": "ic_color", "title": "Philosophy Breakfast with Jonathan Oppenheim", "speakers": "Jonathan Oppenheim", "description": "Start your day with a shot of inspiration from your favourite speakers. Expect stimulating ideas along with fresh pastries and coffee.We assume cause precedes effect, and the past fixes the future. But what if time works differently from how we perceive it? Join quantum physicist Jonathan Oppenheim, a leading theorist reshaping debates on time and causality, to explore radical ideas about how the future may help shape the now.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/philosophy-breakfast-with-jonathan-oppenheim-41043", "thumbnail_url": "./HTLGI_files/45-Jonathan-Oppenheim.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41043", "item_id": "45", "offset": "39", "position": "1", "event_number": "Event [45]", "start_dt": "2026-05-23 09:00:00", "end_dt": "2026-05-23 10:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "9:00am", "venue": "Inner Circle Tent", "session_type": "Inner Circle", "session_type_class": "ic_color", "title": "Philosophy Breakfast with Cory Doctorow", "speakers": "Cory Doctorow", "description": "Start your day with a shot of inspiration from your favourite speakers. Expect stimulating ideas along with fresh pastries and coffee.Technology promised freedom and creativity. Instead, digital life is dominated by monopoly power, AI slop, and phone addiction. Join bestselling author of Enshittification and anti-big-tech activist Cory Doctorow, to uncover how platforms hollow out democracy and how the internet can be reclaimed by its users.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/philosophy-breakfast-with-cory-doctorow-41044", "thumbnail_url": "./HTLGI_files/46-Cory-Doctorow-2.webp", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/hay/festival-passes", "fast_passes_status": "Sold Out", "product_id": "41044", "item_id": "46", "offset": "40", "position": "2", "event_number": "Event [46]", "start_dt": "2026-05-23 09:00:00", "end_dt": "2026-05-23 10:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "10:00am", "venue": "Academy", "session_type": "IAI Academy", "session_type_class": "AS_color", "title": "Media, Post-Truth, and the Democratisation of Knowledge", "speakers": "Steve Fuller", "description": "For most of human history, the media has operated on a broadcast model. Some were licensed to speak, and others expected to listen. From Plato’s suspicion of unregulated writing to technocrats defending expertise, authority was centralised and protected. But according to Steve Fuller, one of the founders of the field of social epistemology and a pioneer of post-truth philosophy, social media has destroyed this distinction. Join Fuller as he argues we are witnessing a radical democratisation of knowledge, with profound consequences for what is considered true and false, knowledge and nonsense. Part One: Why the medium has always been the messagePart Two: Democratising knowledge in the age of post-truth“Almost absurdly erudite… not a whiff of snobbishness.” – Scientific American", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/media-post-truth-and-the-democratisation-of-knowledge-41046", "thumbnail_url": "./HTLGI_files/48-media-post-truth-and-the-democratisation-of-knowledge.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41046", "item_id": "48", "offset": "42", "position": "4", "event_number": "Event [48]", "start_dt": "2026-05-23 10:00:00", "end_dt": "2026-05-23 11:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "10:00am", "venue": "Ring", "session_type": "Talks", "session_type_class": "tlk_color", "title": "The Return of Malcolm X", "speakers": "Kehinde Andrews", "description": "Malcolm X is often written off as a slogan or a threat. Join the first Black studies professor in the UK, Kehinde Andrews, as he restores Malcolm X's radical clarity. Malcolm was not a detour from civil rights, but its sharpest diagnosis. Andrews argues alongside him that racism is structural, global, and enduring, not a moral glitch. Integration without justice was never liberation. Malcolm’s challenge remains unfinished: self-determination, power, and truth over comfort. \"Once again Kehinde Andrews nails it!\" — Kalwant Bhopal", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/the-return-of-malcolm-x-41045", "thumbnail_url": "./HTLGI_files/47-The-return-of-malcom-X.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41045", "item_id": "47", "offset": "41", "position": "3", "event_number": "Event [47]", "start_dt": "2026-05-23 10:00:00", "end_dt": "2026-05-23 11:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "10:30am", "venue": "Arena", "session_type": "Debates", "session_type_class": "dnt_color", "title": "Gutenberg vs Zuckerberg", "speakers": "Mary Harrington, Cory Doctorow, Jimmy Wales. Isabel Hilton hosts", "description": "Gutenberg’s printing press transformed the world. The surge in literacy and the democratisation of knowledge helped ignite the Enlightenment. 500 years later, the internet is initiating a new transformation. Zuckerberg claims his digital networks have connected billions and made information more accessible than ever before. But critics claim that beneath this triumph of access lies a crisis of thought. Reading is in free-fall: fewer young people enjoy reading today than at any point in the past twenty years, and OECD data show literacy stagnating across the developed world. Some argue we are witnessing a reversal of the Enlightenment itself, with shorter attention spans and less ability to handle complex ideas.If the literate mind shaped the modern world, what kind of world will the post-literate mind create? Are the rise of digital media and the decline of literacy dangerous trends that threaten our politics, culture, and thought itself? Or should we celebrate the internet as a new and radical extension of Gutenberg's dream of democratising the production and distribution of knowledge?Founder of Wikipedia, Jimmy Wales, tech-critic Cory Doctorow, and journalist Mary Harrington debate technology, literacy, and knowledge in a post-enlightenment world.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/gutenberg-vs-zuckerberg-41047", "thumbnail_url": "./HTLGI_files/49-gutenberg-vs-zuckerberg.webp", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/hay/festival-passes", "fast_passes_status": "Fast Passes Sold Out", "product_id": "41047", "item_id": "49", "offset": "43", "position": "5", "event_number": "Event [49]", "start_dt": "2026-05-23 10:30:00", "end_dt": "2026-05-23 11:30:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "10:30am", "venue": "Hat", "session_type": "Hat Sessions", "session_type_class": "HS_color", "title": "The Geoengineering Gamble", "speakers": "Adrienne Buller, Joel Wainwright, Andreas Malm", "description": "Once regarded as science fiction, geoengineering — the attempt to correct the climate through interventions such as reflecting sunlight back into space or removing carbon dioxide from the atmosphere — is being taken increasingly seriously. But are these geoengineering strategies a viable solution, or do they risk even greater climate instability? With fossil fuels still central to the global economy and geopolitical tensions shaping energy supplies, some scientists and policymakers are beginning to ask whether large-scale technological interventions in the Earth’s climate will soon be necessary.Should we turn to once controversial, last-resort climate tools like solar geoengineering solutions in a world that can't wean itself off oil, to protect the most exposed to climate impacts? Or does geoengineering pose existential risks to climatic, geopolitical, and ecological stability, while distracting from the urgent task of cutting emissions?In partnership with The BREAK-DOWN", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/the-geoengineering-gamble-41049", "thumbnail_url": "./HTLGI_files/51-the-geoengineering-gamble.LOGO.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41049", "item_id": "51", "offset": "45", "position": "7", "event_number": "Event [51]", "start_dt": "2026-05-23 10:30:00", "end_dt": "2026-05-23 11:30:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "10:30am", "venue": "International", "session_type": "Debates", "session_type_class": "dnt_color", "title": "Music and The Sound of the Unsayable", "speakers": "Sheila Atim, Steven Mithen, Magnus Fiennes, Janne Teller. Joanna Kavenna hosts", "description": "The Western tradition has prioritised language, and its remarkable precision, as the primary tool for understanding reality. But some claim music is a means to reach depths and meaning unreachable in words, as Victor Hugo argued, \"music expresses that which cannot be said\". While Darwin made the case that language actually originated with music. Some recent research supports this claim. Babies respond to pitch and rhythm long before they understand words – suggesting music runs deeper than language. While psychologists have demonstrated music can trigger a physiological response to a perceived truth or beauty that subjects report as \"impossible to describe in words\".Should we use music to access deeper realms of reality, and recognise that in some respects it can reach further than language? And if our use of music developed either alongside or before language, is it more central to our understanding of the world? Or should we not forget that it is language that sets us apart and has made knowledge possible?Olivier Award-winning actress and musician Sheila Atim, award-winning author Janne Teller, linguistic archaeologist Steven Mithen, and composer and songwriter Magnus Fiennes debate music and reality.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/music-and-the-sound-of-the-unsayable-41048", "thumbnail_url": "./HTLGI_files/50-music-and-the-sound-of-the-unsayable.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41048", "item_id": "50", "offset": "44", "position": "6", "event_number": "Event [50]", "start_dt": "2026-05-23 10:30:00", "end_dt": "2026-05-23 11:30:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "11:00am", "venue": "Blue Moon Tent", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41054", "item_id": "56", "offset": "50", "position": "12", "event_number": "Event [56]", "start_dt": "2026-05-23 11:00:00", "end_dt": "2026-05-23 12:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "11:00am", "venue": "Children's Tent", "session_type": "Children's Programme", "session_type_class": "chd_color", "title": "The Magic Crown", "speakers": "Peter Worley", "description": "In an imaginary land, far, far away, lives a magic crown, and whoever wears it instantly becomes the king or queen of all the land. One day, you find the crown in the street. Would you put it on? Join 'The If Man', Peter Worley, to explore this and other unbelievable objects. Author of The If Machine, The If Odyssey, The Philosophy Shop, and 40 Lessons to Get Children Thinking, join Worley for The If Adventures, where fun can only be had only IF you are there.", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41051", "item_id": "53", "offset": "47", "position": "9", "event_number": "Event [53]", "start_dt": "2026-05-23 11:00:00", "end_dt": "2026-05-23 12:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "11:00am", "venue": "Inner Circle Tent", "session_type": "Inner Circle", "session_type_class": "ic_color", "title": "Philosophy Brunch with Jeremy Corbyn", "speakers": "Jeremy Corbyn", "description": "It's not every day you get to join a political legend for a delicious brunch. Avocado and eggs on toast never tasted so good. Can a new political movement break Britain’s two-party deadlock? Join Jeremy Corbyn, former leader of the Labour party and now leader of the recently formed “Your Party”, to explore grassroots democracy, economic justice, and whether Your Party, Reform, the Greens, or someone else will break the UK's two-party deadlock permanently.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/philosophy-brunch-with-jeremy-corbyn-41052", "thumbnail_url": "./HTLGI_files/54-jeremy-corbyn.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41052", "item_id": "54", "offset": "48", "position": "10", "event_number": "Event [54]", "start_dt": "2026-05-23 11:00:00", "end_dt": "2026-05-23 12:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "11:00am", "venue": "Inner Circle Tent", "session_type": "Inner Circle", "session_type_class": "ic_color", "title": "Philosophy Brunch with Yasmin Alibhai-Brown", "speakers": "Yasmin Alibhai-Brown", "description": "It's not every day you get to join a leading journalist for a delicious brunch. Avocado and eggs on toast never tasted so good. Debates over race, feminism, and free speech are now being dismissed as yesterday’s culture wars. Yet, their importance hasn't similarly disappeared overnight. Join celebrated writer and broadcaster Yasmin Alibhai-Brown to examine pluralism, disagreement, and how diverse societies hold together under pressure.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/philosophy-brunch-with-yasmin-alibhai-brown-41053", "thumbnail_url": "./HTLGI_files/55-Yasmin-Alibhai-Brown-2.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41053", "item_id": "55", "offset": "49", "position": "11", "event_number": "Event [55]", "start_dt": "2026-05-23 11:00:00", "end_dt": "2026-05-23 12:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "11:00am", "venue": "Ring", "session_type": "Talks", "session_type_class": "tlk_color", "title": "Pragmatism and The Pursuit of Truth", "speakers": "Cheryl Misak, David Edmonds", "description": "After the horrors of the First World War, the members of the progressive Vienna Circle decided that the best way to rid politics and ethics of ideology was to transform them into scientific studies--sociological studies of what people in fact desire. The Fascists hated the Circle and indeed its leader, Moritz Schlick, was gunned down on the steps of the University of Vienna in what was widely interpreted to be a politically motivated murder. Wittgenstein recoiled at the idea that politics and ethics should be scientific, saying that we couldn't speak of them at all. F.P. Ramsey argued that both the Vienna Circle and Wittgenstein were wrong, suggesting that we have to be able to evaluate our political and ethical beliefs as rules with which we meet the future. Cheryl Misak and David Edmonds discuss why these issues are more pressing today than ever. \"Unlikely to be bettered.\" — London Review of Books", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/pragmatism-and-the-pursuit-of-truth-41050", "thumbnail_url": "./HTLGI_files/52-pragmatism-and-the-persuit-of-truth.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41050", "item_id": "52", "offset": "46", "position": "8", "event_number": "Event [52]", "start_dt": "2026-05-23 11:00:00", "end_dt": "2026-05-23 12:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "11:30am", "venue": "Hat", "session_type": "Debates", "session_type_class": "dnt_color", "title": "Doctors vs Machines", "speakers": "Denis Noble, Xand van Tulleken, Charlotte Blease. Claudia Canavan hosts", "description": "For generations, we have been convinced that 'doctor knows best'. But with the rise of online information, the principle is being challenged. And from anxieties about patients “playing doctor” to criticism directed against AI, the medical establishment is resisting the threat to its decision-making. But the evidence is mounting. As a major study published in Nature demonstrated back in 2020, AI first surpassed doctors in specialist recognition tasks like X-ray assessment. Then in 2023, AI significantly outperformed doctors in a national medical exam. And in 2024, the first evidence that AI was better in general diagnosis came with the \"Amie\" study, demonstrating that on 28 out of 32 criteria, AI was both more accurate in diagnosis and judged more empathetic by patients. Is it time to recognise that in many fields, doctors no longer know best? Should AI hold all our medical records and use its processing power to identify trends long before doctors are able to spot them? Or must human judgement remain central to our health and to the best treatment?BBC broadcaster and doctor Xand van Tulleken, Oxford professor and challenger of Dawkins, Denis Noble, and philosopher of medicine Charlotte Blease debate AI doctors.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/doctors-vs-machines-41055", "thumbnail_url": "./HTLGI_files/57-doctors-vs-machines.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41055", "item_id": "57", "offset": "51", "position": "13", "event_number": "Event [57]", "start_dt": "2026-05-23 11:30:00", "end_dt": "2026-05-23 12:30:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "11:30am", "venue": "Stage", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Cosima Suzanne", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41056", "item_id": "58", "offset": "52", "position": "14", "event_number": "Event [58]", "start_dt": "2026-05-23 11:30:00", "end_dt": "2026-05-23 12:30:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "12:00pm", "venue": "Arena", "session_type": "Debates", "session_type_class": "dnt_color", "title": "The End of the Great Alliance", "speakers": "Jeremy Corbyn, Michael Ignatieff, Gillian Tett. Rana Mitter hosts", "description": "The heart of the West has been the allegiance of the US and Europe. But Trump's December 2025 Strategic Review outlines a very different world order in which the US is not necessarily allied to Europe at all. Instead, the US lays claim to a sphere of influence covering the whole of the Americas, North and South. If there was any doubt that this was mere rhetorical hyperbole, Trump claimed the US will 'run' Venezuela following the capture of Maduro, and laid claim to the huge territory of Greenland even though European states believed its annexation would be the end of NATO. Europe is re-arming, but must it stand on its own as a great military power in its own right? With a GDP equivalent to the US and larger than China, Europe has the economic clout to be one of the major global powers, but can it do so without a single leadership structure? Or is Trump right and the future of Europe a dwindling power with ever-diminishing cultural significance?Newly elected leader of Your Party, Jeremy Corbyn, former leader of the Canadian Liberal Party, Michael Ignatieff, and FT columnist Gillian Tett debate politics after the US-Europe alliance.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/the-end-of-the-great-alliance-41057", "thumbnail_url": "./HTLGI_files/59-the-end-of-the-great-aliance.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41057", "item_id": "59", "offset": "53", "position": "15", "event_number": "Event [59]", "start_dt": "2026-05-23 12:00:00", "end_dt": "2026-05-23 13:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "12:00pm", "venue": "Blue Moon Tent", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Grace Morton", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41060", "item_id": "62", "offset": "56", "position": "18", "event_number": "Event [62]", "start_dt": "2026-05-23 12:00:00", "end_dt": "2026-05-23 13:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "12:00pm", "venue": "International", "session_type": "Debates", "session_type_class": "dnt_color", "title": "The Edge of the World", "speakers": "Joanna Kavenna, Steven Mithen, Erling Kagge, Maria Balaska. Sophie Scott-Brown hosts", "description": "Ancient voyagers set off \"into seas where maps were silent, and sailors feared falling off the edge of the world.” But today, the unknown is harder to come by. Almost every part of the Earth's surface is mapped. Reachable space we know to be empty and desolate. With the world's knowledge available to all at our fingertips, even intellectual adventures are arguably rarer. Not only is it more difficult to have adventures, Harvard research shows people have less appetite for them too. Moreover, according to a study from Berlin University, lack of adventure is reducing overall life satisfaction and happiness. Does the disappearance of the unknown and decline in adventure mean that something has fundamentally changed about what it is to be human? Is it important to catch sight of the edge of the world, and where might this now be found? Or does the world remain, as it has always been, profoundly unknown, and have we only covered up this state of affairs with our illusions of knowledge and scientific truth?Polar explorer Erling Kagge, award-winning novelist Joanna Kavenna, philosopher Maria Balaska, and archaeologist Steven Mithen search for adventure and the unknown in the modern world.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/the-edge-of-the-world-41058", "thumbnail_url": "./HTLGI_files/60-the-edge-of-the-world.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41058", "item_id": "60", "offset": "54", "position": "16", "event_number": "Event [60]", "start_dt": "2026-05-23 12:00:00", "end_dt": "2026-05-23 13:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "12:00pm", "venue": "Ring", "session_type": "Talks", "session_type_class": "tlk_color", "title": "Rethinking the Global Orthodoxy", "speakers": "", "description": "We thought that prosperity ran on open borders, frictionless trade, and global supply chains. Trump's tariffs challenged that orthodoxy. Join acclaimed author, former President of PEN International, and Trump critic, John Ralston Saul, as he argues that faith in globalism is, in fact, a dangerous illusion. Overreliance on borderless institutions has hollowed out local economies, weakened democratic accountability, and fractured civic trust. Saul contends that genuine freedom and resilient citizenship demand we reclaim national agency, rebuild community self-reliance, and rethink the orthodoxy of globalisation.\"A prophet.\" — TIME MagazineIn partnership with AudioNote", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/rethinking-the-global-orthodoxy-41059", "thumbnail_url": "./HTLGI_files/61-rethinking-the-global-orthodoxy.LOGO.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41059", "item_id": "61", "offset": "55", "position": "17", "event_number": "Event [61]", "start_dt": "2026-05-23 12:00:00", "end_dt": "2026-05-23 13:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "12:30pm", "venue": "Children's Tent", "session_type": "Children's Programme", "session_type_class": "chd_color", "title": "Pottery Extravaganza", "speakers": "Bare Glazed Pottery Studio", "description": "Bare Glazed Pottery Studio is a creative hub for budding artists and makers in Wiltshire! Join our portable pottery workshops for a fun and relaxing session of making. You will learn one of three different hand-building techniques: pinch pots, coiling, or slab work, and create a masterpiece that commemorates your wonderful festival experience. These workshops are structured around different levels of ability, so whether you’re a complete beginner or improver, all are welcome! Class duration: 1.5 hours (Please arrive 5 mins before the class starts)Pricing:Adults (16+) are £12Under 16s are £10 (helpers of young children are free)Book this early to avoid disappointment!", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/pottery-extravaganza-41062", "thumbnail_url": "./HTLGI_files/pottery.webp", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41062", "item_id": "64", "offset": "58", "position": "20", "event_number": "Event [64]", "start_dt": "2026-05-23 12:30:00", "end_dt": "2026-05-23 13:30:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "12:30pm", "venue": "Stage", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Poppea", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41061", "item_id": "63", "offset": "57", "position": "19", "event_number": "Event [63]", "start_dt": "2026-05-23 12:30:00", "end_dt": "2026-05-23 13:30:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "1:00pm", "venue": "Blue Moon Tent", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Kate Daggett", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41066", "item_id": "68", "offset": "62", "position": "24", "event_number": "Event [68]", "start_dt": "2026-05-23 13:00:00", "end_dt": "2026-05-23 14:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "1:00pm", "venue": "Hat", "session_type": "Hat Sessions", "session_type_class": "HS_color", "title": "The Future of the Tech Crisis", "speakers": "Cory Doctorow", "description": "We once believed the internet would flatten power, democratise culture, and make gatekeepers obsolete. But today it doesn't look like that, and arguably did the opposite. Internet platforms followed a predictable arc: serve users, then businesses, then themselves. Cory Doctorow — award-winning writer, technology critic, and long-time digital rights activist — has spent decades arguing that this trajectory isn’t a moral failing or a tech bug, but a structural inevitability of monopoly and weak regulation. Join Doctorow as he makes the case that the future of technology will be decided not by innovation alone, but by power and ownership. We must rebuild an internet where users, not platforms, finally set the terms. \"Far enough ahead of the game to give you that authentic chill of the future.\" — Warren Ellis", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/the-future-of-the-tech-crisis-41064", "thumbnail_url": "./HTLGI_files/66-the-future-of-the-tech-crisis.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41064", "item_id": "66", "offset": "60", "position": "22", "event_number": "Event [66]", "start_dt": "2026-05-23 13:00:00", "end_dt": "2026-05-23 14:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "1:00pm", "venue": "Inner Circle Tent", "session_type": "Inner Circle", "session_type_class": "ic_color", "title": "Philosophy Lunch with Guy Standing", "speakers": "Guy Standing", "description": "Your opportunity to enjoy a delicious lunch with our inspiring speakers and award-winning wine. Work was meant to provide security, purpose, and dignity. Instead, for millions, it has become unstable and insecure. Join economist Guy Standing, renowned advocate of Universal Basic Income, to explore how precarious labour is reshaping politics, identity, and our economic future.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/philosophy-lunch-with-guy-standing-41065", "thumbnail_url": "./HTLGI_files/67-Guy-Standing.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41065", "item_id": "67", "offset": "61", "position": "23", "event_number": "Event [67]", "start_dt": "2026-05-23 13:00:00", "end_dt": "2026-05-23 13:15:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "1:00pm", "venue": "Ring", "session_type": "Talks", "session_type_class": "tlk_color", "title": "When Compassion Turns Dangerous", "speakers": "Kathleen Stock. Mary Ann Sieghart hosts", "description": "With an increasingly ageing population, few issues expose our moral confusion like assisted dying. Join controversial philosopher Kathleen Stock as she argues that expanding assisted death risks redefining care as elimination and autonomy as abandonment. Stock claims good intentions are not safeguards, and that dignity for the elderly or terminally ill should not be measured by independence or productivity, but by an unwavering commitment to protect life – even when suffering demands patience. \"Boy does she pack a punch.\" — Christina Patterson", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/when-compassion-turns-dangerous-41063", "thumbnail_url": "./HTLGI_files/65-when-compassion-turns-dangerous.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41063", "item_id": "65", "offset": "59", "position": "21", "event_number": "Event [65]", "start_dt": "2026-05-23 13:00:00", "end_dt": "2026-05-23 14:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "1:15pm", "venue": "Arena", "session_type": "Debates", "session_type_class": "dnt_color", "title": "Everything We Knew About Economics Is Wrong", "speakers": "Zia Yusuf, Paul Johnson, Faiza Shaheen. Hilary Lawson hosts", "description": "When Fukuyama infamously declared “the end of history”, it summed up his view that liberal economics had won the battle against socialism and would remain the dominant economic framework for all time to come. The success of Chinese state capitalism has been an obvious challenge to the claim. But now, from Trump to Le Pen, Reform to the AfD, there is within the West a challenge to traditional liberal economics that comes not from socialism but from populist economic nationalism. It takes issue with central elements of liberal economics, arguing against free trade and in favour of tariffs and state intervention, while at the same time proposing tax cuts. Economic history, it would seem, isn't over yet. Are we seeing the emergence of a new and credible economic theory? Or is this no more than a combination of popular policies that make no economic sense? More fundamentally, is this evidence that liberal economics is not a coherent economic theory in the first place, and that a grand overall economic theory is neither necessary nor possible?Leading figure in Reform UK Zia Yusuf, economic policy analyst Paul Johnson, and firebrand economist Faiza Shaheen debate economic populism.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/everything-we-knew-about-economics-is-wrong-41067", "thumbnail_url": "./HTLGI_files/69-everything-we-know-about-economics-is-wrong.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41067", "item_id": "69", "offset": "63", "position": "25", "event_number": "Event [69]", "start_dt": "2026-05-23 13:15:00", "end_dt": "2026-05-23 14:15:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "1:15pm", "venue": "Inner Circle Tent", "session_type": "Inner Circle", "session_type_class": "ic_color", "title": "Philosophy Lunch with Denis Noble", "speakers": "Denis Noble", "description": "Your opportunity to enjoy a delicious lunch with our inspiring speakers and award-winning wine. Genes are not destiny. Join challenger of Richard Dawkins, Denis Noble, to explore how life is shaped by networks, feedback, and downward causation, challenging reductionist views of evolution, biology, and what it means to be an organism.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/philosophy-lunch-with-denis-noble-41069", "thumbnail_url": "./HTLGI_files/71-Denis-noble.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41069", "item_id": "71", "offset": "65", "position": "27", "event_number": "Event [71]", "start_dt": "2026-05-23 13:15:00", "end_dt": "2026-05-23 14:15:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "1:15pm", "venue": "International", "session_type": "Debates", "session_type_class": "dnt_color", "title": "Escaping the Shackles of Language", "speakers": "Martha Fiennes, Lera Boroditsky. Jack Symes hosts", "description": "We tend to believe that language is the best way to express thought. Yet words can obscure as much as they reveal. Philosophers from Nietzsche to Heidegger argue that language is largely metaphor and unable to describe reality fully. Artists have long recognised this. \"If you could say it in words, there would be no reason to paint,\" said Edward Hopper. The feeling created by a Rothko painting, for example, would be difficult or impossible to create using words. Meanwhile, in everyday conversations, spoken language accounts for only 7% of the emotional judgements we make, with tone and body language accounting for the rest.In a world rapidly shifting towards videos, images, and music, can non-verbal forms of expression say more than words ever could? Are non-verbal forms of expression the key to accessing truths that language cannot reach? Or is language the only route to clarity, complexity, and precision, and images and video a threat to our culture and thought?Award-winning director Martha Fiennes, cognitive scientist and linguist Lera Boroditsky, and philosopher Julian Baggini debate whether language is holding us back.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/escaping-the-shackles-of-language-41068", "thumbnail_url": "./HTLGI_files/70-escaping-the-shackles-of-language.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41068", "item_id": "70", "offset": "64", "position": "26", "event_number": "Event [70]", "start_dt": "2026-05-23 13:15:00", "end_dt": "2026-05-23 14:15:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "1:30pm", "venue": "Academy", "session_type": "IAI Academy", "session_type_class": "AS_color", "title": "Gravity in a Quantum World", "speakers": "Jonathan Oppenheim", "description": "For decades, physicists have argued that making sense of gravity and quantum mechanics meant joining one of two camps: string theory or loop quantum gravity. Both treat the quantisation of spacetime as unavoidable. But UCL quantum information and quantum gravity theorist Jonathan Oppenheim argues for a radical third way: one where gravity remains fundamentally classical, provided it contains a built-in element of randomness. His idea not only challenges dominant theories, but opens up the possibility of testing experimentally whether gravity is truly quantum.Part One: Escaping the “Two Camps” — A Third Way to Combine Gravity and Quantum TheoryPart Two: Gravity as Fundamental Noise — What We Could Measure and Why It Matters“Oppenheim is undoing decades of theoretical physics gospel.” – Curt Jaimnungal", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/gravity-in-a-quantum-world-41071", "thumbnail_url": "./HTLGI_files/73-gravity-in-a-quantum-world.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41071", "item_id": "73", "offset": "67", "position": "29", "event_number": "Event [73]", "start_dt": "2026-05-23 13:30:00", "end_dt": "2026-05-23 14:30:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "1:30pm", "venue": "Stage", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Sue Harding", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41070", "item_id": "72", "offset": "66", "position": "28", "event_number": "Event [72]", "start_dt": "2026-05-23 13:30:00", "end_dt": "2026-05-23 14:30:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "2:00pm", "venue": "Blue Moon Tent", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Ned Holland", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41076", "item_id": "78", "offset": "72", "position": "34", "event_number": "Event [78]", "start_dt": "2026-05-23 14:00:00", "end_dt": "2026-05-23 15:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "2:00pm", "venue": "Children's Tent", "session_type": "Children's Programme", "session_type_class": "chd_color", "title": "Adventures with the Little Prince", "speakers": "Alexandra Konoplyanik", "description": "Investigate drawings of elephants, boa constrictors, and sheep, discovering what makes good art through the story of The Little Prince with philosopher Alexandra Konoplyanik. Puzzle over important human questions from Antoine de Saint-Exupéry's delightful book, in the company of other young, curious minds, and find out where your own extraordinary thinking takes you.", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41074", "item_id": "76", "offset": "70", "position": "32", "event_number": "Event [76]", "start_dt": "2026-05-23 14:00:00", "end_dt": "2026-05-23 15:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "2:00pm", "venue": "Cinema", "session_type": "DokBox", "session_type_class": "TT_color", "title": "My AI Relationship", "speakers": "", "description": "Would you date a chatbot? Around the world, millions are turning to AI to find their perfect match. In this documentary, single Londoner Jack Reeves explores how artificial intelligence is tackling loneliness and transforming intimacy.", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41075", "item_id": "77", "offset": "71", "position": "33", "event_number": "Event [77]", "start_dt": "2026-05-23 14:00:00", "end_dt": "2026-05-23 15:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "2:00pm", "venue": "Hat", "session_type": "Hat Sessions", "session_type_class": "HS_color", "title": "The Science of Creativity", "speakers": "Sheila Atim", "description": "We tend to think art and science live in separate worlds. But Sheila Atim, Olivier Award–winning actor and star of The Woman King and Bruised, argues that divide is a myth that limits both creativity and scientific innovation. Atim is both an artist and biomedical scientist and demonstrates that the most powerful art emerges when creativity is treated like a scientific experiment: a process of inquiry, discipline, and risk. Join her as she makes the case for a new creative method, one where science and art collide to unlock fresh possibilities for the stage, the screen, and the lab. \"Sheila is a force. I learned so much watching her work.\" — Halle Berry", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/the-science-of-creativity-41073", "thumbnail_url": "./HTLGI_files/75-the-science-of-creativity.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41073", "item_id": "75", "offset": "69", "position": "31", "event_number": "Event [75]", "start_dt": "2026-05-23 14:00:00", "end_dt": "2026-05-23 15:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "2:00pm", "venue": "Ring", "session_type": "Talks", "session_type_class": "tlk_color", "title": "Rowan Williams vs Michael Shermer: The God Debate", "speakers": "Rowan Williams, Michael Shermer. Angie Hobbs hosts", "description": "God is dead, proclaimed Nietzsche over one-hundred years ago. Yet not only do many still believe, religion continues to influence politics, culture, and morality to this day. Join theologian and former Archbishop of Canterbury, Rowan Williams, in a head-to-head with American sceptic and author of Truth, Michael Shermer, as they debate why faith has stuck around, the unexpected forms it has taken, and whether this is a force for societal solidarity or societal collapse. Beyond dogma and culture wars, join a debate on philosophical materialism, meta-ethics, and whether Nietzsche got things wrong.\"Compelling, wise, and lucid.\" — Sarah Bessey \"Michael Shermer has long been one of our most committed champions of scientific thinking.\" — Sam Harris", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/rowan-williams-vs-michael-shermer-the-god-debate-41072", "thumbnail_url": "./HTLGI_files/74-the-god-debate.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41072", "item_id": "74", "offset": "68", "position": "30", "event_number": "Event [74]", "start_dt": "2026-05-23 14:00:00", "end_dt": "2026-05-23 15:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "2:30pm", "venue": "Arena", "session_type": "Debates", "session_type_class": "dnt_color", "title": "Neural Networks and Neural Nonsense", "speakers": "Charlotte Blease, Federico Faggin, Cory Doctorow. Jay Shapiro hosts", "description": "Many see AI as a new and potentially frightening form of intelligence, and the very vocabulary of 'artificial intelligence' lends the technology an aura of mind and agency. But critics argue that these machines don’t think, they compute; they don’t learn, they extract patterns; they don’t understand, they have outputs. Furthermore, they maintain the name 'artificial intelligence' is the greatest misnomer in modern science — a category mistake that confuses computation and pattern-matching with intelligence, turning a mechanical process into a myth of mind. Behind the grand talk of 'the dawn of thinking machines', they contend, lies a glorified abacus, crunching numbers at lightning speed, which we mistake for thought. Is the term 'artificial intelligence' a remarkably successful marketing trick — a linguistic sleight of hand that confuses the output of a dumb machine with cognition? AI helps us with certain tasks, but so does a calculator, or a clock, or an abacus — are they also intelligent? Or is there something profoundly different about large language models that enables the transition from machinery to thought?Designer of the first commercial microprocessor Federico Faggin, philosopher Charlotte Blease, and tech-critic Cory Doctorow debate the realities of artificial intelligence.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/neural-networks-and-neural-nonsense-41077", "thumbnail_url": "./HTLGI_files/79-neural-networks-and-neural-nonsense.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41077", "item_id": "79", "offset": "73", "position": "35", "event_number": "Event [79]", "start_dt": "2026-05-23 14:30:00", "end_dt": "2026-05-23 15:30:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "2:30pm", "venue": "International", "session_type": "Debates", "session_type_class": "dnt_color", "title": "Work, Leisure, and the Meaning of Life", "speakers": "Maurice Glasman, Sophie Scott-Brown, Guy Standing. Isabel Hilton hosts", "description": "“The morality of work is the morality of slaves, and the modern world has no need of slavery,” wrote Bertrand Russell in 1932. Meanwhile, John Maynard Keynes hailed a coming “age of leisure,” when technology would make work unnecessary. Yet as AI seemingly offers the potential to deliver that dream, many across the political spectrum are having doubts. Keir Starmer calls Labour “the party of work,” Donald Trump boasts that he has “no time for rest” and praises “the dignity of work,” while Xi Jinping recently stated hard work is “the noblest, most beautiful virtue.” Moreover, work has long been seen as the key to human flourishing by thinkers from Karl Marx to Simone Weil. Is it time to recognise that a life of leisure is not a utopia but a vacuous waste? Is the challenge with work not to eradicate it, but to ensure that it is valuable, purposeful, and rewarding? Or could a life of leisure be harnessed to create a life of intensity, wisdom, and fulfilment, or would that just be work by another name?Blue L n as the safest path forward. But in a world of stagnating wages, a cost-of-living crisis, broken welfare systems, and climate collapse, safe politics isn’t working. Join firebrand economist Faiza Shaheen to discuss why the future of the left requires ideas that match the scale of the crises we face — bold economic transformation, climate justice, and a politics that puts people before profit.“She’s made a great contribution to political economic thought.” — Jeremy Corbyn", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/the-future-of-the-left-41081", "thumbnail_url": "./HTLGI_files/83-the-future-of-the-left.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41081", "item_id": "83", "offset": "77", "position": "39", "event_number": "Event [83]", "start_dt": "2026-05-23 15:00:00", "end_dt": "2026-05-23 16:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "3:00pm", "venue": "Ring", "session_type": "Talks", "session_type_class": "tlk_color", "title": "The James Webb Telescope's Threat to the Big Bang", "speakers": "Bjørn Ekeberg", "description": "We think the Big Bang explains the origin of our universe. But what if our deepest cosmological theories are limited by how we interpret light itself? Join philosopher of science Bjørn Ekeberg as he examines new observations from the James Webb Space Telescope that challenge the standard cosmic story. Early galaxies appear too large, too structured, too soon: the data don't fit the theory and the gap between theory and evidence is vast. Ekeberg explores how modern cosmology is built entirely on reading faint traces of ancient light, and how anomalies may reveal not just cracks in a theory, but limits in our way of seeing. \"Provocative... makes a radical case.\" — Brian Rotman", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/the-james-webb-telescopes-threat-to-the-big-bang-41080", "thumbnail_url": "./HT em.Sponsored by Country & Town House", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/champagne-cake-and-philosophy-with-steve-stewart-williams-41085", "thumbnail_url": "./HTLGI_files/87-Steve-Stewart-Williams.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41085", "item_id": "87", "offset": "81", "position": "43", "event_number": "Event [87]", "start_dt": "2026-05-23 15:30:00", "end_dt": "2026-05-23 16:30:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "3:30pm", "venue": "Inner Circle Tent", "session_type": "Inner Circle", "session_type_class": "ic_color", "title": "Whisky Tasting and Philosophy with Barry C. Smith", "speakers": "Barry C Smith", "description": "A HowTheLightGetsIn favourite — and not to be missed! Join philosopher of the senses Barry C. Smith for a unique whisky-tasting experience combining philosophy with flavour. Known for appearances on Masterchef and Radio 4’s The Kitchen Cabinet, Smith blends sensory science with philosophical acumen for an experience to savour.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/whisky-tasting-and-philosophy-with-barry-c-smith-41086", "thumbnail_url": "./HTLGI_files/88-barry-smith.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41086", "item_id": "88", "offset": "82", "position": "44", "event_number": "Event [88]", "start_dt": "2026-05-23 15:30:00", "end_dt": "2026-05-23 16:30:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "3:30pm", "venue": "Stage", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Good Weather for an Airstrike", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41083", "item_id": "85", "offset": "79", "position": "41", "event_number": ce. Interviewed by Oli Dugmore, journalist, commentator, and executive editor of the New Statesman, Ignatieff explores the realities of leadership, the present destruction of democratic culture, and whether liberalism still has the intellectual and moral resources to sustain and defend itself. “Engagingly frank... elegant, thoughtful, candid.\" — FTIn partnership with the New Statesman", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/in-defence-of-democracy-41090", "thumbnail_url": "./HTLGI_files/92-in-defence-of-democracy.LOGO.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41090", "item_id": "92", "offset": "86", "position": "48", "event_number": "Event [92]", "start_dt": "2026-05-23 16:00:00", "end_dt": "2026-05-23 17:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "4:00pm", "venue": "International", "session_type": "Debates", "session_type_class": "dnt_color", "title": "Gender Equality and the Freedom Trap", "speakers": "Mary Harrington, Kathleen Stock, Minna Salami, Lucy Jones. Chine Mcdonald hosts", "description": "We believed that freedom would do the work of equality, and that once women could make their own choices, the rest would take care of itself. But studies show that the greater the gender-equality in a country, the more likely women are to choose traditionally gendered paths — prioritising family, motherhood, part-time work, or careers in care and education. Nordic countries, for example, celebrated for gender equality, have some of the lowest proportions of women in leadership. At the same time, freedom has come with a cost. Women pursuing traditional roles are shamed for betraying feminist ideals. And when women pursue work success, 87% report being penalised and undermined. Should we recognise that freedom isn't enough to ensure equality, and further intervention is required? Are women's choices revealing their true preferences? Or is the core issue that we don't sition": "47", "event_number": "Event [91]", "start_dt": "2026-05-23 16:00:00", "end_dt": "2026-05-23 17:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "4:30pm", "venue": "Stage", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Billy Magerison", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41093", "item_id": "95", "offset": "89", "position": "51", "event_number": "Event [95]", "start_dt": "2026-05-23 16:30:00", "end_dt": "2026-05-23 17:30:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "5:00pm", "venue": "Academy", "session_type": "IAI Academy", "session_type_class": "AS_color", "title": "Language and the Making of Meaning", "speakers": "Lera Boroditsky", "description": "Most of us assume that language is a transparent medium for thoughts that we already possess. But cutting-edge research in cognitive science tells a different story: language shapes thought itself, influencing how we perceive, remember, and reason about the world. Drawing on decades of experimental research across cultures, Professor of Cognitive Psychology and National Science Foundation Award winner, Lera Boroditsky, argues that speakers of different languages carve up the world in different ways, and that linguistic differences can affect everything from our sense of time and space to colour perception, memory, moral judgement, and even how we assign blame.Part One: How Language Shapes Perception and MemoryPart Two: Cognitive Flexibility, Culture, and the Limits of Universality“One of the first to show truly convincing effects of language on cognitive processes.\" – Dan Slobin", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/language-and-the-making-of-meaning-41095", "thumbnail_url": "./HTLGI_files/97-language-and-the-making-of-meaning.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41095", "item_id": "97", "offset": "91", "position": "53", "event_number": "Event [97]", "start_dt": "2026-05-23 17:00:00", "end_dt": "2026-05-23 18:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "5:00pm", "venue": "Blue Moon Tent", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Rosie with Words", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41097", "item_id": "99", "offset": "93", "position": "55", "event_number": "Event [99]", "start_dt": "2026-05-23 17:00:00", "end_dt": "2026-05-23 18:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "5:00pm", "venue": "Children's Tent", "session_type": "Children's Programme", "session_type_class": "chd_color", "title": "What To Do If You Turn Invisible", "speakers": "Steven Campbell-Harris", "description": "What would you do if you had a magic ring that made you turn invisible? In this session with philosopher Steven Campbell-Harris, we’ll explore Plato’s famous story of the Ring of Gyges, a thought experiment over two thousand years old. Together we’ll test our intuitions about right and wrong, and what it means to be seen. Is doing the right thing about fear of being caught, or about the kind of person you want to be? And if no one can see you, does being good still matter?", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41096", "item_id": "98", "offset": "92", "position": "54", "event_number": "Event [98]", "start_dt": "2026-05-23 17:00:00", "end_dt": "2026-05-23 18:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "5:00pm", "venue": "Ring", "session_type": "Talks", "session_type_class": "tlk_color", "title": "Overcoming Inequality", "speakers": "Paul Johnson", "description": "Progress was once assumed. Not anymore. Join economist and bestselling author of Follow the Money, Paul Johnson, as he reveals how entrenched inequalities in income, wealth, health, and political power are a direct threat to our way of life. From early life experiences and education to regional divides and generational wealth, he argues that stalled growth has amplified disparities across age, gender, ethnicity, and geography, thus undermining trust, social mobility, and democracy itself. Johnson lays out how we can still change course. \"Fire and passion, combined with the facts.\" — Polly Toynbee", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/overcoming-inequality-41094", "thumbnail_url": "./HTLGI_files/96-overcoming-inequality.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41094", "item_id": "96", "offset": "90", "position": "52", "event_number": "Event [96]", "start_dt": "2026-05-23 17:00:00", "end_dt": "2026-05-23 18:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "5:30pm", "venue": "Arena", "session_type": "Debates", "session_type_class": "dnt_color", "title": "Reason and Revolution", "speakers": "Cornel West, Rowan Williams, Susan Neiman. Sophie Scott-Brown hosts", "description": "We often see reason as providing a solid basis for our theories. Some have even imagined that reason alone can deliver truth. But far from being a stable foundation, critics of reason argue that it is equally a vehicle of destruction. Reason’s drive to question everything makes it a restless force that destabilizes all frameworks. The French Revolution, born from Enlightenment ideals of reason, devoured its own architects and created unrestrained terror. Postmodernism applied the principles of reason to uncover flaws in every outlook, including its own. At a personal level, Cornell studies show that simply writing out reasons for our beliefs weakens rather than strengthens our attachment to them. Should we see reason as a double-edged sword, refining our theories but also undermining them and making society inherently unstable? Do we need to guard against the disruptive power of reason with foundations built on authority, tradition, or religion? Or is the revolutionary character of reason the very basis of its success in driving change, progress, and the living standards of all?American philosopher Cornel West, former Archbishop of Canterbury Rowan Williams, and defender of Enlightenment values Susan Neiman debate the role and risks of reason.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/reason-and-revolution-41098", "thumbnail_url": "./HTLGI_files/100-reason-and-revolution.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41098", "item_id": "100", "offset": "94", "position": "56", "event_number": "Event [100]", "start_dt": "2026-05-23 17:30:00", "end_dt": "2026-05-23 18:30:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "5:30pm", "venue": "Hat", "session_type": "Music", "session_type_class": "ls_color", "title": "Johanna Warren", "speakers": "", "description": "Touring extensively alongside artists such as Mitski and Iron & Wine, nomadic American songwriter Johanna Warren has released seven solo albums and is also a herbalist and Reiki Master. Warren delights in creating intersectional spaces where art meets holistic healing. \"A singer-songwriter you need to know.\" — Rolling Stone Magazine", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41100", "item_id": "102", "offset": "96", "position": "58", "event_number": "Event [102]", "start_dt": "2026-05-23 17:30:00", "end_dt": "2026-05-23 18:30:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "5:30pm", "venue": "International", "session_type": "Debates", "session_type_class": "dnt_color", "title": "Freedom, Democracy and the Law", "speakers": "James Orr, Christopher Steele, Marlene Laruelle, Philippe Sands. Rana Mitter hosts", "description": "Free and fair elections are a central, perhaps the central, feature of liberal democracies, backed by the rule of law. But today, many argue the law has itself become a political weapon, as the word 'lawfare' — recently named word of the year — testifies. In the US, the right insists courts were weaponised to prevent Trump’s second term, while the left now claims he has used the law to target opponents. In France, Le Pen was barred from political office following a conviction many see as politically motivated. While in Germany, the AfD was classified as extremist, authorising government surveillance which prompted the President and 150 MPs to call for them to be banned despite their leading in some polls.Should we see the law not as a safeguard of democracy, but as a weapon that can undermine it? Should we resign ourselves to the fact that those with power and influence will always seek to manipulate the law? Or can we secure democracy and our way of life by refining the law to stop its political use?Human rights lawyer and author Philippe Sands, theologian philosopher and adviser to Nigel Farage, James Orr, former MI6 officer Christopher Steele, and illiberalism studies professor Marlene Laruelle, debate lawfare.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/freedom-democracy-and-the-law-41099", "thumbnail_url": "./HTLGI_files/101-freedom-democracy-and-the-law.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41099", "item_id": "101", "offset": "95", "position": "57", "event_number": "Event [101]", "start_dt": "2026-05-23 17:30:00", "end_dt": "2026-05-23 18:30:00"}, {"day": "Saturday 23rd May",
