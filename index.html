turday 23rd May", "date": "Sat 23 May", "time": "10:30pm", "venue": "Disco", "session_type": "Riverside Disco", "session_type_class": "dis_color", "title": "Kaptin’s Big Lovely Disco", "speakers": "", "description": "Our Saturday night shindig with Big Love and Boomtown Festival legend Kaptin on the decks – he was so good at last year’s HTLGI we just had to bring him back! Join us for a riotous knees-up with one of the best in the business, good vibes, and party anthems all night.", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41128", "item_id": "130", "offset": "124", "position": "86", "event_number": "Event [130]", "start_dt": "2026-05-23 22:30:00", "end_dt": "2026-05-23 23:30:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "10:30pm", "venue": "Ring", "session_type": "Comedy", "session_type_class": "LNS_color", "title": "Huge Davies", "speakers": "", "description": "Edinburgh Award Nominee, Huge Davies, as seen on Cats Does Countdown, Roast Battle, and Off Menu, is back with another hour of new jokes. Join him and his customised keyboard for an hour of jokes, music, and staring starkly into the abyss.\"Had me shaking with laughter.\" ★★★★ — The Telegraph", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41127", "item_id": "129", "offset": "123", "position": "85", "event_number": "Event [129]", "start_dt": "2026-05-23 22:30:00", "end_dt": "2026-05-23 23:30:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "11:00pm", "venue": "Blue Moon Tent", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "The Activators", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41131", "item_id": "133", "offset": "127", "position": "89", "event_number": "Event [133]", "start_dt": "2026-05-23 23:00:00", "end_dt": "2026-05-24 00:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "11:00pm", "venue": "Cinema", "session_type": "DokBox", "session_type_class": "TT_color", "title": "Hooked", "speakers": "", "description": "From phones and alcohol, to gambling and drugs, our brains are being hijacked. Dive deep into the science of addiction and recovery with former heroin addict and neuroscientist Dr Brian Pennie as he asks, what can we do to break free?", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41130", "item_id": "132", "offset": "126", "position": "88", "event_number": "Event [132]", "start_dt": "2026-05-23 23:00:00", "end_dt": "2026-05-24 00:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "11:00pm", "venue": "Hat", "session_type": "Music", "session_type_class": "ls_color", "title": "Graeme Park", "speakers": "", "description": "Few DJs have shaped British music culture like Graeme Park. A pioneer of the 1980s house explosion, his legendary nine-year residency at Manchester’s The Haçienda provided the blueprint for the global rave scene. Today, Park remains a powerhouse of electronic music. He continues to sell out iconic venues like London’s Royal Albert Hall, The Warehouse Project, and Manchester’s Castlefield Bowl, where his Haçienda Classiçal project has made a record-breaking ten consecutive appearances. From remixing New Order to dominating modern festival stages, Parky is the definitive bridge between heritage house and the future of the dancefloor.\"Haçienda legend.\" — BBC", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41129", "item_id": "131", "offset": "125", "position": "87", "event_number": "Event [131]", "start_dt": "2026-05-23 23:00:00", "end_dt": "2026-05-24 00:00:00"}, {"day": "Saturday 23rd May", "date": "Sat 23 May", "time": "11:30pm", "venue": "Stage", "session_type": "Cabaret", "session_type_class": "cab_color", "title": "Boogaloo Stu", "speakers": "", "description": "Following his fourth annual sell-out season of shows at the Brighton Spiegeltent, Boogaloo Stu's outrageous one-man show, where joyous fun and flashmob dance collide, is sure to entertain. A riot of high-camp mischief, his shows are as uplifting as they are unpredictable.“Brings a smile to even the hardest of hearts.” — Broadway Baby", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41132", "item_id": "134", "offset": "128", "position": "90", "event_number": "Event [134]", "start_dt": "2026-05-23 23:30:00", "end_dt": "2026-05-24 00:30:00"}, {"day": "Saturday 23rd May", "date": "Sun 24 May", "time": "12:00am", "venue": "Blue Moon Tent", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Funky All Stars", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41134", "item_id": "136", "offset": "130", "position": "92", "event_number": "Event [136]", "start_dt": "2026-05-24 00:00:00", "end_dt": "2026-05-24 01:00:00"}, {"day": "Saturday 23rd May", "date": "Sun 24 May", "time": "12:00am", "venue": "Ring", "session_type": "Midnight Mayhem", "session_type_class": "mdm_color", "title": "We’re Living in a Simulation vs This is the Real World!", "speakers": "", "description": "With the festival taking place over the traditional Whitsun weekend, a time for wild festivities, join the debate at Midnight Mayhem. Speakers and comedians join forces in our late-night intellectual showdown with a twist. A Wicker Man-style, carnivalesque procession kicks off the show before audience members pick a side and make their voice heard alongside speakers and comedians from our star-studded programme.Scientists have recently concluded that it’s a coin flip. There’s a 50-50 chance that we’re living in a simulation. So, let’s have you decide once and for all! Are we living in a simulation, or is this the real world? Pick your side and put your sparring gloves on for debauchery and debate. Are we living in base reality, or is this world but a cheap imitation? And are you taking the red pill or the blue pill?", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41133", "item_id": "135", "offset": "129", "position": "91", "event_number": "Event [135]", "start_dt": "2026-05-24 00:00:00", "end_dt": "2026-05-24 01:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "9:00am", "venue": "Inner Circle Tent", "session_type": "Inner Circle", "session_type_class": "ic_color", "title": "Philosophy Breakfast with Kehinde Andrews", "speakers": "Kehinde Andrews", "description": "Start your day with a shot of inspiration from your favourite speakers. Expect stimulating ideas along with fresh pastries and coffee.Many assume racial injustice can be solved through inclusion and gradual reform. Yet deep inequalities persist. Join Kehinde Andrews, one of the world's most provocative scholars on race and power, to explore the societal structures that need to change, and how to change them.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/philosophy-breakfast-with-kehinde-andrews-41135", "thumbnail_url": "./HTLGI_files/137-Kehinde-Andrews-3.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41135", "item_id": "137", "offset": "131", "position": "1", "event_number": "Event [137]", "start_dt": "2026-05-24 09:00:00", "end_dt": "2026-05-24 10:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "9:00am", "venue": "Inner Circle Tent", "session_type": "Inner Circle", "session_type_class": "ic_color", "title": "Philosophy Breakfast with Minna Salami", "speakers": "Minna Salami", "description": "Start your day with a shot of inspiration from your favourite speakers. Expect stimulating ideas along with fresh pastries and coffee.We are often told to separate reason from emotion, politics from feeling. Yet how we know and act is shaped by our bodies and our histories. Join cultural theorist and author of Can Feminism Be African?, Minna Salami, to explore embodiment politics.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/philosophy-breakfast-with-minna-salami-41136", "thumbnail_url": "./HTLGI_files/138-Minna-Salami-3.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41136", "item_id": "138", "offset": "132", "position": "2", "event_number": "Event [138]", "start_dt": "2026-05-24 09:00:00", "end_dt": "2026-05-24 10:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "10:00am", "venue": "Academy", "session_type": "IAI Academy", "session_type_class": "AS_color", "title": "Quantum Physics and the Observer Problem", "speakers": "Ivette Fuentes", "description": "For over a century, quantum mechanics has unsettled our most basic assumptions about reality, with radical implications for metaphysics. Join Roger Penrose collaborator and leading quantum physicist, Ivette Fuentes, to learn what the founders of quantum mechanics – from Niels Bohr and Werner Heisenberg to Erwin Schrödinger and Eugene Wigner – really thought about the metaphysics of their theories. Fuentes will cover how modern interpretations – from many-worlds to objective collapse – treat the role of the observer and consciousness, and whether quantum theory might show that reality itself is up for grabs.Part One: The Quantum Revolution and Its Philosophical RootsPart Two: Many Worlds, Materialism, and the Place of Mind in Quantum Reality", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/quantum-physics-and-the-observer-problem-41138", "thumbnail_url": "./HTLGI_files/140-quantum-physics-and-the-observer-problem.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41138", "item_id": "140", "offset": "134", "position": "4", "event_number": "Event [140]", "start_dt": "2026-05-24 10:00:00", "end_dt": "2026-05-24 11:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "10:00am", "venue": "Ring", "session_type": "Talks", "session_type_class": "tlk_color", "title": "Liberalism's Fight for Survival", "speakers": "Michael Ignatieff", "description": "Liberalism once felt inevitable as Fukuyama proclaimed the end of history. Today, under relentless attack, it is beginning to feel inevitable that liberalism will die. Join former leader of the opposition in Canada, Michael Ignatieff, as he examines what happened to the sacredness of democratic ideals and the protection of individual rights. Ignatieff defends liberalism not as the end of history, but as something each generation must stand up for. Liberalism must now earn loyalty anew.\"An ambitious restoration project.\" — The New York Times", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/liberalisms-fight-for-survival-41137", "thumbnail_url": "./HTLGI_files/139-Liberalisms-fight-for-survival.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41137", "item_id": "139", "offset": "133", "position": "3", "event_number": "Event [139]", "start_dt": "2026-05-24 10:00:00", "end_dt": "2026-05-24 11:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "10:30am", "venue": "Arena", "session_type": "Debates", "session_type_class": "dnt_color", "title": "Cosmology in Crisis", "speakers": "Claudia de Rham, George Ellis, Adam Frank. Bjørn Ekeberg hosts", "description": "From the Big Bang to the expanding universe, we imagine we have a detailed account of the origin and formation of the cosmos. But, in the last few years, new evidence from the James Webb Telescope is challenging these assumptions and leading some to propose radically different alternatives. In 2023, the telescope identified a higher rate of expansion for the universe and mature galaxies billions of years earlier than previously predicted. In 2024, NASA confirmed the differences couldn't be explained by measurement error. In combination, these have led some to claim there is a crisis in cosmology sufficiently profound to threaten a wholesale change in our understanding. Do the findings of the James Webb telescope mean our standard account of the universe is mistaken, or can we patch up the current theory to make it compatible with the new observations? Will a new theory require a change to our account of dark energy and the identification of new particles, or is the Big Bang inflation model itself at stake?Theoretical physicist Claudia de Rham, Stephen Hawking collaborator George Ellis, and astronomer Adam Frank interrogate the flaws in our theories of the universe.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/cosmology-in-crisis-41139", "thumbnail_url": "./HTLGI_files/141-Cosmology-in-crisis.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41139", "item_id": "141", "offset": "135", "position": "5", "event_number": "Event [141]", "start_dt": "2026-05-24 10:30:00", "end_dt": "2026-05-24 11:30:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "10:30am", "venue": "Hat", "session_type": "Hat Sessions", "session_type_class": "HS_color", "title": "The Thoughts Computers Can't Think", "speakers": "Alison Gopnik, Simon Baron-Cohen, Maria Balaska", "description": "Intelligence is often measured by facts known and judgments made. Schools reward memorization, work requires discernment, while AI now reduces intelligence to calculation. But intelligence is more than what can be counted, calculated, or measured. Join award-winning cognitive scientist Alison Gopnik, who studies the role of play and curiosity, and clinical psychologist Simon Baron-Cohen, the world’s leading autism expert, to explore what the human mind is, how modern education and technology are reshaping how we think, and what is at risk when we mistake a computer's appearance of thought for thought itself. \"It's rare to come across a surprising new idea, but Simon Baron-Cohen's is one of them.\" — Steven Pinker\"Alison Gopnik is richly provocative and endlessly insightful.\" — Frank J. Sulloway", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/the-thoughts-computers-cant-think-41141", "thumbnail_url": "./HTLGI_files/143-the-thoughts-computers-cant-think.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41141", "item_id": "143", "offset": "137", "position": "7", "event_number": "Event [143]", "start_dt": "2026-05-24 10:30:00", "end_dt": "2026-05-24 11:30:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "10:30am", "venue": "International", "session_type": "Debates", "session_type_class": "dnt_color", "title": "The Reckless and the Rational", "speakers": "Gillian Tett, Paul Johnson, Zachary Karabell. Roger Hearing hosts", "description": "Economic bubbles, from the tulip mania of the 17th century to the 2008 housing bubble that triggered a global financial crisis, are seen as dangerous and destructive. And many claim we are in a new version, the AI bubble. But some argue there are benefits to delusional investments, which can be critical in driving progress. Victorian Railway Mania in Britain created many bankruptcies but gave Britain a railway system that cemented its global dominance. The late '90's dot-com bubble wiped billions off market value but gave us fibre optic cables that delivered the internet to the world. We don't know why a bubble starts, or even if we are in one until it pops, but amongst others, Jeff Bezos has claimed bubbles can be good because \"when the dust settles, you see who the winners are and society benefits from the inventions.”Should we embrace market bubbles, recognising and maximising their benefits? Do we need to abandon the myth of rational actors and see the economy and innovation as driven by delusion? Or is such thinking reckless and irresponsible?Financial Times editor Gillian Tett, economic policy analyst Paul Johnson, author of Boom Byrne Hobart, and author and investor Zachary Karabell question embracing economic bubbles.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/the-reckless-and-the-rational-41140", "thumbnail_url": "./HTLGI_files/142-the-reckless-and-the-rational.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41140", "item_id": "142", "offset": "136", "position": "6", "event_number": "Event [142]", "start_dt": "2026-05-24 10:30:00", "end_dt": "2026-05-24 11:30:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "11:00am", "venue": "Blue Moon Tent", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41146", "item_id": "148", "offset": "142", "position": "12", "event_number": "Event [148]", "start_dt": "2026-05-24 11:00:00", "end_dt": "2026-05-24 12:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "11:00am", "venue": "Children's Tent", "session_type": "Children's Programme", "session_type_class": "chd_color", "title": "Pottery Extravaganza", "speakers": "Bare Glazed Pottery Studio", "description": "Bare Glazed Pottery Studio is a creative hub for budding artists and makers in Wiltshire! Join our portable pottery workshops for a fun and relaxing session of making. You will learn one of three different hand-building techniques: pinch pots, coiling, or slab work, and create a masterpiece that commemorates your wonderful festival experience. These workshops are structured around different levels of ability, so whether you’re a complete beginner or improver, all are welcome! Class duration: 1.5 hours (Please arrive 5 mins before the class starts)Pricing:Adults (16+) are £12Under 16s are £10 (helpers of young children are free)Book this early to avoid disappointment!", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41143", "item_id": "145", "offset": "139", "position": "9", "event_number": "Event [145]", "start_dt": "2026-05-24 11:00:00", "end_dt": "2026-05-24 12:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "11:00am", "venue": "Inner Circle Tent", "session_type": "Inner Circle", "session_type_class": "ic_color", "title": "Philosophy Brunch with Lera Boroditsky", "speakers": "Lera Boroditsky", "description": "It's not every day you get to join a world-leading thinker for a delicious brunch. Avocado and eggs on toast never tasted so good. Language shapes more than communication; it shapes the very way we think. Join University of California cognitive scientist, Lera Boroditsky, to explore how the words we speak influence perception, memory, and even time; revealing how language creates the world around us.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/philosophy-brunch-with-lera-boroditsky-41144", "thumbnail_url": "./HTLGI_files/146-Lera-Boroditsky-2.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41144", "item_id": "146", "offset": "140", "position": "10", "event_number": "Event [146]", "start_dt": "2026-05-24 11:00:00", "end_dt": "2026-05-24 12:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "11:00am", "venue": "Inner Circle Tent", "session_type": "Inner Circle", "session_type_class": "ic_color", "title": "Philosophy Brunch with Martha Fiennes", "speakers": "Martha Fiennes", "description": "It's not every day you get to join a world-leading director for a delicious brunch. Avocado and eggs on toast never tasted so good. Film reshapes how we see power, identity, and reality. Join visionary director and artist Martha Fiennes to explore cinema as a philosophical medium, where storytelling, image, and technology challenge the tyranny of our single perspectives.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/philosophy-brunch-with-martha-fiennes-41145", "thumbnail_url": "./HTLGI_files/147-Martha-Fiennes-2.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41145", "item_id": "147", "offset": "141", "position": "11", "event_number": "Event [147]", "start_dt": "2026-05-24 11:00:00", "end_dt": "2026-05-24 12:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "11:00am", "venue": "Ring", "session_type": "Talks", "session_type_class": "tlk_color", "title": "Rebalancing the Global Order", "speakers": "Kishore Mahbubani", "description": "For centuries, Western powers dominated the global order and mistook that moment for permanence. Join Former President of the UN Security Council, Kishore Mahbubani, who argues the shift now underway is not upheaval but historical rebalancing. Asian and other non-Western societies are not “rising” but returning to their natural weight in world affairs. The danger lies in Western refusal to accept this reality. The West's clinging to primacy is distorting policy and fueling conflict.\"Arguably Asia's most influential thinker.\" — Martin Wolf", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/rebalancing-the-global-order-41142", "thumbnail_url": "./HTLGI_files/144-rebalancing-the-global-order.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41142", "item_id": "144", "offset": "138", "position": "8", "event_number": "Event [144]", "start_dt": "2026-05-24 11:00:00", "end_dt": "2026-05-24 12:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "11:30am", "venue": "Hat", "session_type": "Debates", "session_type_class": "dnt_color", "title": "The Not So Blind Watchmaker", "speakers": "Denis Noble, Eva Jablonka, Samir Okasha. Philip Ball hosts", "description": "For over a century, evolution has been understood as a simple and powerful story: random genetic changes occur, and natural selection preserves those that enhance survival. Life has “no purpose in mind”. It just happens. But current research, in epigenetics and chaos theory, is revealing a messier reality. Genes and DNA are not just a set of fixed instructions. Their impact depends on whether they are expressed, which depends on the cell environment. Moreover, living systems can generate order internally, without it being the consequence of selection. And while the evolutionary story is getting more complex, it is getting no closer to providing an explanation of consciousness and experience. Should we conclude that evolution is not just a blind process and see life as actively shaping itself? Is consciousness more than a clever biological trick, and a sign that the evolutionary account is inherently limited? Or is it a fundamental mistake to seek to reintroduce purpose into evolution – which risks sneaking cosmic meaning and religion back in when Darwin had shown them to be superfluous?Critic of gene theory Denis Noble, epigenetic theorist Eva Jablonka, and philosopher of evolution Samir Okasha debate whether nature has a mind of its own.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/the-not-so-blind-watchmaker-41147", "thumbnail_url": "./HTLGI_files/149-the-not-so-blind-watchmaker.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41147", "item_id": "149", "offset": "143", "position": "13", "event_number": "Event [149]", "start_dt": "2026-05-24 11:30:00", "end_dt": "2026-05-24 12:30:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "11:30am", "venue": "Stage", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Ned Holland", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41148", "item_id": "150", "offset": "144", "position": "14", "event_number": "Event [150]", "start_dt": "2026-05-24 11:30:00", "end_dt": "2026-05-24 12:30:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "12:00pm", "venue": "Arena", "session_type": "Debates", "session_type_class": "dnt_color", "title": "New Age, Old Gods", "speakers": "Steve Stewart-Williams, Simon Critchley, Jessica Frazier. Jack Symes hosts", "description": "Spirituality is seen by many as a gentle, individual alternative to the dogma and dangers of organized religion. But critics argue the distinction is less convincing than it appears. A survey across 22 countries concluded that while large numbers identify as \"spiritual but not religious,\" they still nevertheless held recognizably religious beliefs, from belief in an afterlife to realms beyond the physical world. Moreover, spirituality and religion consistently blur together, sharing overlapping functions, meanings, and psychological effects – with troubling real-world consequences. Critics argue New Age concepts about hidden truths increasingly animate conspiracy movements, providing a spiritual gloss for everything from alternative medicine to QAnon, endangering public health and fostering social division and prejudice.Is spirituality simply religion by another name? Should we reject both alike as unfounded and potentially dangerous dogma? Or is it possible to reject the superstition and retain a considerate, benign approach that provides a personal way of making meaning in an uncertain world?Evolutionary psychologist Steve Stewart-Williams, philosopher and author of On Mysticism, Simon Critchley, and Oxford theologian Jessica Frazier debate modern-day spirituality.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/new-age-old-gods-41149", "thumbnail_url": "./HTLGI_files/151-new-age-old-gods.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41149", "item_id": "151", "offset": "145", "position": "15", "event_number": "Event [151]", "start_dt": "2026-05-24 12:00:00", "end_dt": "2026-05-24 13:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "12:00pm", "venue": "Blue Moon Tent", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Seel And Sanders", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41152", "item_id": "154", "offset": "148", "position": "18", "event_number": "Event [154]", "start_dt": "2026-05-24 12:00:00", "end_dt": "2026-05-24 13:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "12:00pm", "venue": "International", "session_type": "Debates", "session_type_class": "dnt_color", "title": "Lost in the Universe", "speakers": "Steve Fuller, Claudia de Rham, George Efstathiou. Jay Shapiro hosts", "description": "We have long sought an accurate map of the heavens. For thousands of years, Aristotle and Ptolemy's Earth-centred model dominated. It was displaced by Copernicus and the Sun-centred solar system we all take for granted. And today, many cosmologists believe we can capture a picture of the universe itself. But critics argue such a map is impossible. From Earth, the Sun appears to move around us, yet the perspective from the solar system, or the galaxy, or the cosmic microwave background, provide different views of motion and structure. Some imagined the microwave background would provide a universal rest frame, but recent observations reveal unevenness, reminding us that there is no final vantage point from which to view the universe.Is the idea of an objective and universal map of the cosmos illusory? Should we accept that we can give no account of where we are in the universe? Or might we one day map the universe as it truly is, and what might it in principle look like?Theoretical physicist Claudia de Rham, post-truth philosopher Steve Fuller, and cosmological modeller George Efstathiou debate our place in the cosmos.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/lost-in-the-universe-41150", "thumbnail_url": "./HTLGI_files/152-Lost-in-the-universe.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41150", "item_id": "152", "offset": "146", "position": "16", "event_number": "Event [152]", "start_dt": "2026-05-24 12:00:00", "end_dt": "2026-05-24 13:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "12:00pm", "venue": "Ring", "session_type": "Talks", "session_type_class": "tlk_color", "title": "Consciousness, Panpsychism, and Quantum Information", "speakers": "Federico Faggin", "description": "Consciousness is fundamental, so argues physicist, engineer, and inventor of the first commercial microprocessor, Federico Faggin. Drawing on quantum physics and information theory, he argues for his outspoken view: quantum information panpsychism, which argues quantum fields are conscious, have free will, and an inherent drive to know themselves. With 20th-century quantum physicists Schrödinger and Planck also arguing consciousness is fundamental, come and witness this view's latest proponent among physicists.\"Relentlessly inventive.\" — Terry Grimwood", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/consciousness-panpsychism-and-quantum-information-41151", "thumbnail_url": "./HTLGI_files/153-Consciousness-panpsychism-and-quantum-information.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41151", "item_id": "153", "offset": "147", "position": "17", "event_number": "Event [153]", "start_dt": "2026-05-24 12:00:00", "end_dt": "2026-05-24 13:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "12:30pm", "venue": "Children's Tent", "session_type": "Children's Programme", "session_type_class": "chd_color", "title": "Who Owns The Moon?", "speakers": "Miriam Cohen", "description": "What if you could own the moon? Or a song? Or an idea? Join philosopher Miriam Cohen for this playful, thought-provoking session where we dive into big questions about ownership. What does it really mean to say something is \"mine\"? Can I own anything, or are some things off limits? And what do we owe to other people, including children not yet born?", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41153", "item_id": "155", "offset": "149", "position": "19", "event_number": "Event [155]", "start_dt": "2026-05-24 12:30:00", "end_dt": "2026-05-24 13:30:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "12:30pm", "venue": "Stage", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Wychbury", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41154", "item_id": "156", "offset": "150", "position": "20", "event_number": "Event [156]", "start_dt": "2026-05-24 12:30:00", "end_dt": "2026-05-24 13:30:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "1:00pm", "venue": "Blue Moon Tent", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Alex Seel (Seel & Sanders)", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41158", "item_id": "160", "offset": "154", "position": "24", "event_number": "Event [160]", "start_dt": "2026-05-24 13:00:00", "end_dt": "2026-05-24 14:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "1:00pm", "venue": "Hat", "session_type": "Hat Sessions", "session_type_class": "HS_color", "title": "The Age of Assassination", "speakers": "David Whetham, Sophie Duroy. Angie Hobbs hosts", "description": "Last century we pondered the ethics of killing Hitler. This century political assassination and targeted killings have become defining features of warfare. Drone strikes under Obama killed thousands in the Middle East and Africa; under Putin, Russia has killed its political dissidents abroad; the Saudis assassinated Jamal Khashoggi under bin Salman; Israel has targeted Iranian non-combatant civilian scientists under Netanyahu. And this February, the US and Israel convulsed the world with joint strikes to assassinate Iran’s Supreme Leader, Ali Khamenei.Does the rise in political assassination threaten global stability and blur the distinction between civilians and combatants? Are international institutions like the ICC powerless to prevent or punish extrajudicial killings in a new world order where might makes right? Or should assassination be seen as a powerful tool, enabling states to target limited numbers of people while sparing soldiers and civilians from wider conflict?A Forum for European Philosophy event", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/the-age-of-assassination-41156", "thumbnail_url": "./HTLGI_files/158-the-age-of-assassination-LOGO.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41156", "item_id": "158", "offset": "152", "position": "22", "event_number": "Event [158]", "start_dt": "2026-05-24 13:00:00", "end_dt": "2026-05-24 14:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "1:00pm", "venue": "Inner Circle Tent", "session_type": "Inner Circle", "session_type_class": "ic_color", "title": "Philosophy Lunch with Karl Friston", "speakers": "Karl Friston", "description": "Your opportunity to enjoy a delicious lunch with our inspiring speakers and award-winning wine. Reality, some neuroscientists now claim, is a controlled hallucination. Join one of the most-cited living scientists, Karl Friston, to explore the predictive brain, the free-energy principle, and how we should understand human thought in the age of AI.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/philosophy-lunch-with-karl-friston-41157", "thumbnail_url": "./HTLGI_files/159-Karl-Friston-HowTheLightGetsIn-Hay-Festival-2026-2.webp", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/hay/festival-passes", "fast_passes_status": "Sold Out", "product_id": "41157", "item_id": "159", "offset": "153", "position": "23", "event_number": "Event [159]", "start_dt": "2026-05-24 13:00:00", "end_dt": "2026-05-24 13:15:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "1:00pm", "venue": "Ring", "session_type": "Talks", "session_type_class": "tlk_color", "title": "The Hidden Philosophy of Food", "speakers": "", "description": "Whether we eat to live, or live to eat, how often do we question the philosophical roots of our diet? Join philosopher and author of How the World Eats, Julian Baggini, as he contends that to understand humanity, we must examine the plate. From Japanese precision to Italian conviviality, philosophy reaches beyond the lecture hall to the dinner table. Drawing on research across cultures, Baggini reveals how what we eat (and how we eat it) shapes identity, ethics, and meaning itself. (81)“Jaw-dropping” – TLS", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/the-hidden-philosophy-of-food-41155", "thumbnail_url": "./HTLGI_files/157-human-minds-are-not-machines.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41155", "item_id": "157", "offset": "151", "position": "21", "event_number": "Event [157]", "start_dt": "2026-05-24 13:00:00", "end_dt": "2026-05-24 14:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "1:15pm", "venue": "Arena", "session_type": "Debates", "session_type_class": "dnt_color", "title": "Patriotism, Populism, and the Fate of Nations", "speakers": "Mahmood Mamdani, Zia Yusuf, Gillian Tett. Rana Mitter hosts", "description": "\"In the 21st century, we are defined not by our borders, but by our bonds,\" said President Obama. For decades, in response to an increasingly global economy, the direction of travel had been the softening of borders and a suspicion of nationalism. But times have changed. Across the western world, support for populist parties has mounted along with calls for tighter borders, defence of national identities, and an end to immigration. And across the political spectrum, the rhetoric has followed. Globalists who had once defended an end to borders now come under attack as defenders of an educated elite. Is nationalism and national identity necessary to protect the lives and living standards of the average working person, and are open borders and global travel the goal and privilege of the elite? Or is nationalism always a vehicle for intolerance, and the resort of demagogues and tyrants? And as national identities become more precisely drawn, how are we to avoid increasing conflict not only between nations but within them? Scholar of colonialism Mahmood Mamdani, FT editor Gillian Tett, and Leading figure in Reform UK Zia Yusuf debate populism.In partnership with AudioNote", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/patriotism-populism-and-the-fate-of-nations-41159", "thumbnail_url": "./HTLGI_files/161-Patriotism-populism-and-the-fate-of-nations.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41159", "item_id": "161", "offset": "155", "position": "25", "event_number": "Event [161]", "start_dt": "2026-05-24 13:15:00", "end_dt": "2026-05-24 14:15:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "1:15pm", "venue": "Inner Circle Tent", "session_type": "Inner Circle", "session_type_class": "ic_color", "title": "Philosophy Lunch with Ivette Fuentes", "speakers": "Ivette Fuentes", "description": "Your opportunity to enjoy a delicious lunch with our inspiring speakers and award-winning wine. Ivette Fuentes puts bold ideas about reality and quantum physics to the experimental test. Join the quantum physicist and Roger Penrose collaborator to explore how gravity, spacetime, and information interact, and how cutting-edge experiments are probing quantum physics beyond standard theory.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/philosophy-lunch-with-ivette-fuentes-41161", "thumbnail_url": "./HTLGI_files/163-Ivette-Fuentes.lxp.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41161", "item_id": "163", "offset": "157", "position": "27", "event_number": "Event [163]", "start_dt": "2026-05-24 13:15:00", "end_dt": "2026-05-24 14:15:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "1:15pm", "venue": "International", "session_type": "Debates", "session_type_class": "dnt_color", "title": "Judgment Day In A Post-Truth Age", "speakers": "Kehinde Andrews, Yasmin Alibhai-Brown. Maria Balaska hosts", "description": "We once thought the facts speak for themselves, and we could use them to make fair and accurate judgments about people or the world. But, in our post-truth age, neither facts nor judgments are seen as neutral. Facts, as Thomas Kuhn argued, are theory-dependent. So facts don't decide the matter, and judgments involve deciding which perspective and which facts to adopt. Landmark rulings illustrate the point. The abolition of slavery and marriage equality came about not by the appeal of new facts but by a shift of perspective, which changed how the facts were seen. The same applies in science. Competing theories, and how to judge between them, are now often hotly contested. Should we see judgment as a central skill or faculty, weighing alternative facts and perspectives, and defining the truth? In our post-truth world, should we develop and teach judgment skills, and are these to be based on practical outcomes, reason, or emotional appeal? Or is all judgment inevitably political and an exercise of power? The first UK Black Studies Professor Kehinde Andrews and journalist Yasmin Alibhai-Brown question judgment in a post-truth world.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/judgment-day-in-a-post-truth-age-41160", "thumbnail_url": "./HTLGI_files/162-judgement-day-in-a-post-truth-age.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41160", "item_id": "162", "offset": "156", "position": "26", "event_number": "Event [162]", "start_dt": "2026-05-24 13:15:00", "end_dt": "2026-05-24 14:15:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "1:30pm", "venue": "Academy", "session_type": "Talks", "session_type_class": "tlk_color", "title": "The Elementary Forms of Human Freedom", "speakers": "David Wengrow", "description": "We think we understand what freedom is. But according to anthropologist and co-author of The Dawn of Everything, David Wengrow, humans have lost the ability to imagine and exercise certain freedoms that were commonplace in our ancestral past. Placing a value on liberty is not a uniquely Western value, as we have often been told. Freedom has been central to human history and the human story. We are not driven solely by evolution or societal forces; human decisions drive history. And they still do. \"Fascinating, thought-provoking, groundbreaking\" — Rutger Bregman", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/the-elementary-forms-of-human-freedom-41163", "thumbnail_url": "./HTLGI_files/165-the-elementary-forms-of-human-freedom.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41163", "item_id": "165", "offset": "159", "position": "29", "event_number": "Event [165]", "start_dt": "2026-05-24 13:30:00", "end_dt": "2026-05-24 14:30:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "1:30pm", "venue": "Stage", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Sue Harding", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41162", "item_id": "164", "offset": "158", "position": "28", "event_number": "Event [164]", "start_dt": "2026-05-24 13:30:00", "end_dt": "2026-05-24 14:30:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "2:00pm", "venue": "Blue Moon Tent", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Grace Elizabeth Harvey", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41168", "item_id": "170", "offset": "164", "position": "34", "event_number": "Event [170]", "start_dt": "2026-05-24 14:00:00", "end_dt": "2026-05-24 15:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "2:00pm", "venue": "Children's Tent", "session_type": "Children's Programme", "session_type_class": "chd_color", "title": "Mind Control Lessons", "speakers": "Steven Campbell-Harris", "description": "Can I control your mind? Come and find out in this fun, hands-on session of live experiments as we probe what “control” really means, with philosopher Steven Campbell-Harris. Are your choices actually yours, or are they decided by unexpected forces? How much power do you have over what you do and what you think, and where does that power mysteriously run out? Through mind-reading illusions and fun philosophical puzzles, this session invites you to explore what you can control about yourself, and why sometimes it is OK to let go and see what happens.", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41166", "item_id": "168", "offset": "162", "position": "32", "event_number": "Event [168]", "start_dt": "2026-05-24 14:00:00", "end_dt": "2026-05-24 15:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "2:00pm", "venue": "Cinema", "session_type": "DokBox", "session_type_class": "TT_color", "title": "Voices of the Universe", "speakers": "", "description": "18 Nobel Prize winners come together to tell the universe’s greatest story: how matter gave rise to life, and life to thought. They tackle humanity’s most fundamental questions: what is the universe made of? Where does life come from? And how did it all begin?", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41167", "item_id": "169", "offset": "163", "position": "33", "event_number": "Event [169]", "start_dt": "2026-05-24 14:00:00", "end_dt": "2026-05-24 15:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "2:00pm", "venue": "Hat", "session_type": "Hat Sessions", "session_type_class": "HS_color", "title": "The Rise of Eco-Fascism", "speakers": "Adrienne Buller, Richard Seymour, Lukas Slothuus", "description": "We have tended to think environmentalism belongs to the political left. But across Europe, climate and ecological rhetoric is increasingly being taken up by nationalist, right-wing movements. In Hungary under Viktor Orbán, “protecting the nation” is framed in cultural, demographic, and increasingly ecological terms. In Germany, figures around the AfD have fused anti-immigration politics with environmental narratives rooted in blood-and-soil nationalism. Join political economist Lukas Slothuus, and journalist and author Richard Seymour to examine whether environmentalism is inherently progressive or conservative, and to explore fringe movements from denialism to eco-fascism, and what they mean for politics and democracy going forward.In partnership with The BREAK-DOWN", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/the-rise-of-eco-fascism-41165", "thumbnail_url": "./HTLGI_files/167-the-rise-of-ecofascism.LOGO.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41165", "item_id": "167", "offset": "161", "position": "31", "event_number": "Event [167]", "start_dt": "2026-05-24 14:00:00", "end_dt": "2026-05-24 15:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "2:00pm", "venue": "Ring", "session_type": "Talks", "session_type_class": "tlk_color", "title": "Memories Are Not Stored in the Brain", "speakers": "Victoria Trumbull", "description": "We have been told that memories are stored in our brains. Join philosopher of time Victoria Trumbull as she argues this is a radical mistake. The brain doesn't store data like a hard drive. Drawing on the philosophy of mind and cognitive science, Trumbull claims the brain enables memory without containing it, and that time itself stores memory. Memory, Trumbull insists, lives beyond neural storage, and challenges our deepest-held assumptions about the universe, reality, and our places within it. \"Favourite thing I've read in a while.\" — Matt Segall", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/memories-are-not-stored-in-the-brain-41164", "thumbnail_url": "./HTLGI_files/166-memories-are-not-stored-in-the-brain.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41164", "item_id": "166", "offset": "160", "position": "30", "event_number": "Event [166]", "start_dt": "2026-05-24 14:00:00", "end_dt": "2026-05-24 15:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "2:30pm", "venue": "Arena", "session_type": "Debates", "session_type_class": "dnt_color", "title": "The Unintelligible Universe", "speakers": "Adam Frank, Chiara Marletto, Brian Greene, Hilary Lawson. Philip Ball hosts", "description": "“Look deep into nature, and you will understand everything better,” claimed Albert Einstein. And we naturally expect scientific investigation into nature to reveal a comprehensible universe. Yet the more modern physics develops, the less it seems to make sense. Relativity tells us that the passing of time is an illusion; quantum mechanics that observation creates reality, and effects can precede causes. While string theorists claim we inhabit a universe of 26 hidden dimensions. Physicists admit they can ''calculate but not visualise'' with little agreement on what their own theories mean. Is our inability to make our physical theories intelligible a challenge to our everyday understanding of the world, or a challenge to contemporary physics? Should we treat the theories as mathematical models and give up on them as descriptions of reality? Or could it be that theoretical physics can capture in mathematics a truth about the universe that is beyond our understanding?String theorist Brian Greene, astronomer Adam Frank, theoretical physicist Chiara Marletto, and post-realist philosopher Hilary Lawson ask whether the universe makes any sense.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/the-unintelligible-universe-41169", "thumbnail_url": "./HTLGI_files/171-The-Unintelligible-Universe.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41169", "item_id": "171", "offset": "165", "position": "35", "event_number": "Event [171]", "start_dt": "2026-05-24 14:30:00", "end_dt": "2026-05-24 15:30:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "2:30pm", "venue": "International", "session_type": "Debates", "session_type_class": "dnt_color", "title": "The Age of the Illiberal Democracy", "speakers": "Kishore Mahbubani, Michael Ignatieff, Marlene Laruelle. Roger Hearing hosts", "description": "The West is often defined as the home of liberal democracy, and liberalism and democracy as inseparable. But from the start, there has been tension between democracy as the will of the majority, and liberalism as the protection of minority rights and free speech. Now we are seeing the rise of so-called 'illiberal democracies', sceptical of checks on executive power and liberal institutions. Illiberal democracies are now the most common form of government, according to The Economist. Victor Orbán, the former President of Hungary, listed his own country, along with Singapore, Russia, Turkey, and China among them, with 3% higher growth on average over the last 30 years than the liberal democracies of the West. Does illiberal democracy threaten autocratic, or even fascist regimes? Is democracy meaningless if government constrains freedom of speech or seeks to influence the media and the judiciary? Or are unelected bodies such as the civil service, federal agencies, academia, and the law themselves potential threats to the democratic will of the people?Former leader of the Canadian Liberal Party Michael Ignatieff, illiberalism professor Marlene Laruelle, and former President of the UN Security Council Kishore Mahbubani debate illiberalism.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/the-age-of-the-illiberal-democracy-41170", "thumbnail_url": "./HTLGI_files/172-the-age-of-the-illiberal-democracy.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41170", "item_id": "172", "offset": "166", "position": "36", "event_number": "Event [172]", "start_dt": "2026-05-24 14:30:00", "end_dt": "2026-05-24 15:30:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "2:30pm", "venue": "Stage", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Fran Lusty", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41171", "item_id": "173", "offset": "167", "position": "37", "event_number": "Event [173]", "start_dt": "2026-05-24 14:30:00", "end_dt": "2026-05-24 15:30:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "3:00pm", "venue": "Blue Moon Tent", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41174", "item_id": "176", "offset": "170", "position": "40", "event_number": "Event [176]", "start_dt": "2026-05-24 15:00:00", "end_dt": "2026-05-24 16:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "3:00pm", "venue": "Hat", "session_type": "Talks", "session_type_class": "tlk_color", "title": "The Life and Philosophy of Stephen Hawking", "speakers": "George Ellis, Bernard Carr, Shini Somara", "description": "The scientific quest sought to describe the universe and render it explicable. Yet Stephen Hawking, alongside collaborators like George Ellis, revealed something far stranger and more unsettling. From black holes to the shape of space-time, the universe repeatedly defies explanation. Late in his life, Hawking concluded that our scientific accounts of the world – including his own – are not so much descriptions of reality but mathematical models of the universe. Hawking embraced a model-dependent view of truth: our theories sometimes work, but they don't describe objective reality. Join his collaborator George Ellis, alongside engineer and BBC broadcaster Shini Somara, to explore Hawking's remarkable life and philosophy.\"Stephen Hawking was the rare scientist who became a cultural icon.\" — Sean Carroll", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/the-life-and-philosophy-of-stephen-hawking-41173", "thumbnail_url": "./HTLGI_files/175-the-life-and-philosophy-of-stephen-hawking.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41173", "item_id": "175", "offset": "169", "position": "39", "event_number": "Event [175]", "start_dt": "2026-05-24 15:00:00", "end_dt": "2026-05-24 16:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "3:00pm", "venue": "Ring", "session_type": "Talks", "session_type_class": "tlk_color", "title": "Education Has Lost Its Way", "speakers": "Guy Standing", "description": "Education was supposed to empower us. Join economist and author of Human Capital: The Tragedy of the Education Commons, Guy Standing, as he argues the modern education system has been corrupted by market logic. Credentials have replaced curiosity, while debt has replaced opportunity. AI has made all this far worse, as students enter university without basic writing skills. Standing argues for an education system rooted in social cohesion, democracy, and the enhancement of individual freedom.\"A brilliant clarion call.\" — Yanis Varoufakis In partnership with AudioNote", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/education-has-lost-its-way-41172", "thumbnail_url": "./HTLGI_files/174-education-has-lost-its-way.LOGO.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41172", "item_id": "174", "offset": "168", "position": "38", "event_number": "Event [174]", "start_dt": "2026-05-24 15:00:00", "end_dt": "2026-05-24 16:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "3:30pm", "venue": "Children's Tent", "session_type": "Children's Programme", "session_type_class": "chd_color", "title": "The Prince and the Pig", "speakers": "Zoe Drewitt", "description": "Prince Nickolai has everything a little boy could want: a grand palace to live in, servants to wait on him hand and foot, and the certainty that one day he will be king. But, despite all these riches, Nickolai is always miserable. One day in the barnyard, he sees the pigs enjoying themselves rolling in the mud without a care in the world. \"I wish I was a happy pig!\" exclaims Nickolai. But at that moment, a genie is passing by; Nickolai can have his wish granted! But is it really better to be a happy pig than an unhappy person? Join philosopher Zoe Drewitt to help Nikolai decide.", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41176", "item_id": "178", "offset": "172", "position": "42", "event_number": "Event [178]", "start_dt": "2026-05-24 15:30:00", "end_dt": "2026-05-24 16:30:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "3:30pm", "venue": "Inner Circle Tent", "session_type": "Inner Circle", "session_type_class": "ic_color", "title": "Champagne, Cake and Philosophy with Christopher Steele", "speakers": "Christopher Steele", "description": "Liven up your afternoon with a glass of champagne, cake, and conversation with some of the world's leading thinkers. The rules-based world order is over. A new world has emerged. What part will intelligence services play in that world? Join the man who ran the Russia desk at MI6, Christopher Steele, to explore secrecy, misinformation, and power in the age of Trump. Sponsored by Country & Town House", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/champagne-cake-and-philosophy-with-christopher-steele-41177", "thumbnail_url": "./HTLGI_files/179-Christopher-Steele.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41177", "item_id": "179", "offset": "173", "position": "43", "event_number": "Event [179]", "start_dt": "2026-05-24 15:30:00", "end_dt": "2026-05-24 16:30:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "3:30pm", "venue": "Inner Circle Tent", "session_type": "Inner Circle", "session_type_class": "ic_color", "title": "Champagne, Cake and Philosophy with Trudy Barber", "speakers": "Trudy Barber", "description": "Liven up your afternoon with a glass of champagne, cake, and conversation with some of the world's leading thinkers. Digital technologies are reshaping intimacy, identity, and desire. Join expert on robot sex, Trudy Barber, to debate pleasure, online culture, and technologically mediated sex, and to explore how user-generated content is transforming how relationships, bodies, and power are experienced online.Sponsored by Country & Town House", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/champagne-cake-and-philosophy-with-trudy-barber-41178", "thumbnail_url": "./HTLGI_files/180-trudy-barber.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41178", "item_id": "180", "offset": "174", "position": "44", "event_number": "Event [180]", "start_dt": "2026-05-24 15:30:00", "end_dt": "2026-05-24 16:30:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "3:30pm", "venue": "Stage", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Holly & The Field", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41175", "item_id": "177", "offset": "171", "position": "41", "event_number": "Event [177]", "start_dt": "2026-05-24 15:30:00", "end_dt": "2026-05-24 16:30:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "4:00pm", "venue": "Arena", "session_type": "Debates", "session_type_class": "dnt_color", "title": "After The West — A New World", "speakers": "John Gray, Hilary Lawson. Sophie Scott-Brown hosts", "description": "In the West, we have been sold an Enlightenment story: reason will free us, knowledge will accumulate, and history will deliver progress. But this story is in jeopardy. Reason has eaten its own tail, leaving us unmoored in a seemingly post-truth age. Progress for many has stalled, with young people often expecting to be less well off than their parents. Meanwhile, the economic and political dominance of the West is unravelling. In recent years, almost 60% of global GDP growth has been generated in Asia, while liberal democracy around the world has been in retreat for 17 consecutive years.Should we see the unraveling of Enlightenment values and of the West's economic and political dominance as connected phenomena? Can a civilisation exist without foundational ideas, and if our notions of objective truth and progress are now in question, what should replace them?Influential critic of humanism and author of Straw Dogs, philosopher John Gray, and Closure theorist and post-postmodern philosopher Hilary Lawson debate the new world after the West.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/after-the-west-a-new-world-41179", "thumbnail_url": "./HTLGI_files/181-after-the-west-a-new-world.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41179", "item_id": "181", "offset": "175", "position": "45", "event_number": "Event [181]", "start_dt": "2026-05-24 16:00:00", "end_dt": "2026-05-24 17:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "4:00pm", "venue": "Blue Moon Tent", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Mr H", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41184", "item_id": "186", "offset": "180", "position": "50", "event_number": "Event [186]", "start_dt": "2026-05-24 16:00:00", "end_dt": "2026-05-24 17:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "4:00pm", "venue": "Cinema", "session_type": "DokBox", "session_type_class": "TT_color", "title": "Ulysses", "speakers": "", "description": "Homer's Odyssey is among the oldest works of classical literature, and soon the subject of a Christopher Nolan film. Today, archaeologists and geologists are using cutting-edge tech to investigate the truth behind the legend.", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41183", "item_id": "185", "offset": "179", "position": "49", "event_number": "Event [185]", "start_dt": "2026-05-24 16:00:00", "end_dt": "2026-05-24 17:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "4:00pm", "venue": "Hat", "session_type": "Hat Sessions", "session_type_class": "HS_color", "title": "The Future of God and Government", "speakers": "Nick Spencer, James Orr, Yasmin Alibhai-Brown, Mary Ann Sieghart", "description": "Religion is back in politics. Whether it’s MAGA’s grip on the American right, US bishops condemning ICE, Tommy Robinson’s carol service, or the counter-protest of the Churches Refugee Network, national politics is increasingly being debated in religious terms. Across multiple contexts and traditions, faith, identity, and moral authority are shaping public life in ways not seen for decades. Join Nick Spencer, Senior Fellow at Theos; James Orr, political philosopher; Mary Ann Sieghart, best-selling author; and Yasmin Alibhai-Brown, award-winning journalist and critic of religious authoritarianism, as they debate what is driving this wider religious resurgence and whether liberal democracy can withstand it.In partnership with Theos", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/the-future-of-god-and-government-41182", "thumbnail_url": "./HTLGI_files/184-the-future-of-god-and-government.LOGO.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41182", "item_id": "184", "offset": "178", "position": "48", "event_number": "Event [184]", "start_dt": "2026-05-24 16:00:00", "end_dt": "2026-05-24 17:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "4:00pm", "venue": "International", "session_type": "Debates", "session_type_class": "dnt_color", "title": "Maps of the Mind", "speakers": "Victoria Trumbull, Simon Baron-Cohen, Karl Friston. Miriam Frankel hosts", "description": "Neuroscientists have often argued \"the mind is nothing more than a pattern of electrical activity in the brain” and have sought to explain how the brain works based on scans of brain activity. These claims are seemingly confirmed by the success of technology such as Neuralink that enables individuals to control robots with their thoughts. But critics argue such claims are profoundly mistaken. Scans of blood flow in the brain or PET scans do not provide an account of how the brain thinks. While Neuralink relies on trial and error and pattern matching, rather than an explanation of how the brain works. Furthermore, neuroscience has not yielded medical breakthroughs in the treatment of brain disease, and some argue this is because it fundamentally does not explain brain function. Were we mistaken to imagine that neuroscience can explain how the brain works? Are maps of physical brain function in principle incapable of explaining how we think? Or will neuroscience prove to enable powerful technology even if it does not explain thought?One of the world's most cited neuroscientists Karl Friston, philosopher of time Victoria Trumbull, and Cambridge autism researcher Simon Baron-Cohen debate the mind and the brain.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/maps-of-the-mind-41180", "thumbnail_url": "./HTLGI_files/182-maps-of-the-mind.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41180", "item_id": "182", "offset": "176", "position": "46", "event_number": "Event [182]", "start_dt": "2026-05-24 16:00:00", "end_dt": "2026-05-24 17:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "4:00pm", "venue": "Ring", "session_type": "Talks", "session_type_class": "tlk_color", "title": "Buddhism and the Emptiness of Reality", "speakers": "Jessica Frazier", "description": "Reality appears full of distinct objects. In such a reality, the Buddhists' claims of the world's \"emptiness\" are hard to make sense of. Join Oxford philosopher Jessica Frazier to explore emptiness as relational richness, not nothingness. Things lack fixed essence, yet overflow with interdependence. Frazier's vision dissolves ego without dissolving meaning. Far from nihilism, emptiness grounds compassion, ethics, and insight. To see clearly is not to grasp harder, but to let go of what never truly existed in the first place.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/buddhism-and-the-emptiness-of-reality-41181", "thumbnail_url": "./HTLGI_files/183-Buddhism-and-the-emptiness-of-reality.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41181", "item_id": "183", "offset": "177", "position": "47", "event_number": "Event [183]", "start_dt": "2026-05-24 16:00:00", "end_dt": "2026-05-24 17:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "4:30pm", "venue": "Stage", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Poppea", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41185", "item_id": "187", "offset": "181", "position": "51", "event_number": "Event [187]", "start_dt": "2026-05-24 16:30:00", "end_dt": "2026-05-24 17:30:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "5:00pm", "venue": "Academy", "session_type": "IAI Academy", "session_type_class": "AS_color", "title": "The Philosophy of Sport", "speakers": "Emily Ryall", "description": "Sport is often judged by results: who won, who lost, who broke the record. But beyond victory and statistics lies something less tangible – beauty. A perfectly weighted pass, a gymnast’s seamless routine, the arc of a long-distance strike. Philosopher of sport Emily Ryall draws on her work in the aesthetics and ethics of sport to argue that sports generate meaning not just through competition, but through form, style, and embodied expression. Sports are central to our lives, and Ryall shows how we can appreciate them as profound art.Part One: Sporting Beauty – What Makes Performance Aesthetic?Part Two: Art, Competition, and Meaning", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/the-philosophy-of-sport-41188", "thumbnail_url": "./HTLGI_files/190-The-philosophy-of-sport.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41188", "item_id": "190", "offset": "184", "position": "54", "event_number": "Event [190]", "start_dt": "2026-05-24 17:00:00", "end_dt": "2026-05-24 18:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "5:00pm", "venue": "Blue Moon Tent", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Hay Climate Choir", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41190", "item_id": "192", "offset": "186", "position": "56", "event_number": "Event [192]", "start_dt": "2026-05-24 17:00:00", "end_dt": "2026-05-24 18:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "5:00pm", "venue": "Children's Tent", "session_type": "Children's Programme", "session_type_class": "chd_color", "title": "Pinka and Arwin Go Forth", "speakers": "Donal Coonan", "description": "Two puzzled aliens just crashed down on Earth, and they’ve got a question: what exactly is a human being? Answer this question with the help of philosopher and trained clown Daniel Coonan, an experienced educator who specialises in creating playful, high-energy enquiries where children feel confident to question boldly and think deeply.", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41189", "item_id": "191", "offset": "185", "position": "55", "event_number": "Event [191]", "start_dt": "2026-05-24 17:00:00", "end_dt": "2026-05-24 18:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "5:00pm", "venue": "Hat", "session_type": "Debates", "session_type_class": "dnt_color", "title": "Affluence and Its Aftershocks", "speakers": "Guy Standing, John Ralston Saul, Janne Teller. Shini Somara hosts", "description": "Most assumed material advancement would translate directly into emotional and psychological well-being. For decades, richer societies, better medicine, and rapid technological change were meant to make lives safer, longer, and more fulfilling. Instead, the opposite seems to be unfolding. The Global Burden of Disease Study reports that while mortality is falling overall, youth deaths are stagnating or rising across North and Latin America, driven by suicide, substance abuse, and self-harm. Anxiety and depression have surged. In a world of record wealth and medical knowledge, despair and neglect are becoming as lethal as disease. Moreover, studies show that richer nations have higher rates of depression than middle-income nations. Was it a mistake to assume that ever greater material success would drive satisfaction and fulfillment, once basic needs are provided? Should well-being be treated not as a material struggle but as a shared cultural goal of belonging, stability, and purpose? Or are material benefits the most reliable way to increase quality of life and well-being? Universal basic income advocate Guy Standing, philosopher and former President of PEN John Ralston Saul, and author of Nothing, Janne Teller ask whether rich societies can buy happiness.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/affluence-and-its-aftershocks-41187", "thumbnail_url": "./HTLGI_files/189-affluence-and-its-aftershocks.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41187", "item_id": "189", "offset": "183", "position": "53", "event_number": "Event [189]", "start_dt": "2026-05-24 17:00:00", "end_dt": "2026-05-24 18:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "5:00pm", "venue": "Ring", "session_type": "Talks", "session_type_class": "tlk_color", "title": "Intelligence in the New World Order", "speakers": "Christopher Steele. Roger Hearing hosts", "description": "Join former MI6 intelligence officer Christopher Steele as he reveals just how drastically the world has changed in Trump's second term as President. Alliances have weakened, great-power competition intensified, and authoritarian states are growing bolder. Drawing on decades of experience tracking the Kremlin’s strategy, Steele outlines the future of the war in Ukraine, the future of Europe, and the heightened role intelligence agencies like the CIA and MI6 play today. \"Fascinating.\" — The New York Times", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41186", "item_id": "188", "offset": "182", "position": "52", "event_number": "Event [188]", "start_dt": "2026-05-24 17:00:00", "end_dt": "2026-05-24 18:00:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "5:30pm", "venue": "Arena", "session_type": "Debates", "session_type_class": "dnt_color", "title": "One Giant Conflict for Mankind", "speakers": "Kishore Mahbubani, Laura Grego, Adam Frank. Philip Collins hosts", "description": "“One giant leap for mankind” were Armstrong's famous words as he stepped onto the moon. But some claim space exploration is instead emerging as a military battleground that could even lead to warfare on Earth. Following Russia, the US first tested their ability to attack satellites in space in 1985. In the last few years, China and India have joined them. Space technology can also have impact on Earth. Musk’s satellites have supported Ukraine in its war with Russia. And we've seen the first instance of space combat when, in 2023, outside of the Earth's atmosphere, Israel intercepted a Houthi missile. Should we recognise that space exploration for the good of everyone is always a fantasy — after all, the Americans also planted their flag on the moon? Can international agreement help maintain peace, or will the strongest always play by their own rules? Or can and should we still see space as an exciting adventure that can bring profound benefits to humanity?Former President of the UN Security Council Kishore Mahbubani, space policy expert Laura Grego, and astronomer Adam Frank debate whether we can avoid war in space.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/one-giant-conflict-for-mankind-41191", "thumbnail_url": "./HTLGI_files/193-one-giant-conflict-for-mankind.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41191", "item_id": "193", "offset": "187", "position": "57", "event_number": "Event [193]", "start_dt": "2026-05-24 17:30:00", "end_dt": "2026-05-24 18:30:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "5:30pm", "venue": "Inner Circle Tent", "session_type": "Inner Circle", "session_type_class": "ic_color", "title": "Wine Tasting and Philosophy with Barry C. Smith", "speakers": "Barry C Smith", "description": "A wine-tasting experience like no other. Pairing fine wines with fine philosophy, each as you've never known them before. As seen on Masterchef and Radio 4’s The Kitchen Cabinet, join philosopher Barry C. Smith to discover the hidden inner-workings of taste. Expect notes of oak, black cherry, and a little existential wonder.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/wine-tasting-and-philosophy-with-barry-c-smith-41194", "thumbnail_url": "./HTLGI_files/wine-tasting.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41194", "item_id": "196", "offset": "190", "position": "60", "event_number": "Event [196]", "start_dt": "2026-05-24 17:30:00", "end_dt": "2026-05-24 18:30:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "5:30pm", "venue": "International", "session_type": "Debates", "session_type_class": "dnt_color", "title": "The Good, the Bad, and the Universal", "speakers": "Marlene Laruelle, Kathleen Stock, Simon Critchley. Jonny Thomson hosts", "description": "We assume morality applies equally to all. Regardless of status, culture, or circumstance, universal principles govern human actions. But critics argue moral universalism is both historically unusual and a Western Enlightenment fantasy. In ancient Rome, duties differed between citizen and slave, elite and commoner. Moral principles do not apply in all circumstances; 'though shalt not kill' does not apply on the battlefield. In Christian Europe, for centuries, opposing sides in battle saw good and God on their side. Nor do we apply the same moral standards to children and adults, and today many wish to apply different moral codes to the oppressed and the powerful. Do we need to reject moral universalism as a goal that was always implausible and used to defend contradictory actions? Should we see Western moral universalism as a vehicle for imposing a Western perspective and hierarchy on others? Or is the principle of universalism essential to any morality at all, and without it, we are at the mercy of the dominant and the powerful?Continental philosopher Simon Critchley, columnist and philosopher Kathleen Stock, and leading political philosopher Marlene Laruelle debate the virtues and vices of moral universalism.", "event_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/events/the-good-the-bad-and-the-universal-41192", "thumbnail_url": "./HTLGI_files/194-the-good-the-bad-and-the-universal.webp", "ticket_url": "", "fast_passes_status": "", "product_id": "41192", "item_id": "194", "offset": "188", "position": "58", "event_number": "Event [194]", "start_dt": "2026-05-24 17:30:00", "end_dt": "2026-05-24 18:30:00"}, {"day": "Sunday 24th May", "date": "Sun 24 May", "time": "5:30pm", "venue": "Stage", "session_type": "Music & Acoustic", "session_type_class": "ds_color", "title": "Kate McDouall", "speakers": "", "description": "", "event_url": "", "thumbnail_url": "", "ticket_url": "https://howthelightgetsin.org/FullEventListPage_Controller/festivals/hay/festival-passes", "fast_passes_status": "", "product_id": "41193", "item_id": "195", "offset": "189", "position": "59",
